<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário / Quiz - Denver Maquininhas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #d6d6d6;
      --border: #373737;
      --border-hover: #4a4a4a;
      --input-bg: #efefef;
      --input-text: #111111;
      --yellow: #f6d300;
      --yellow-soft: rgba(246, 211, 0, 0.16);
      --yellow-soft-2: rgba(246, 211, 0, 0.08);
      --error: #ff6b6b;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      padding: 28px 20px 40px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    h1, h2 {
      margin: 0 0 12px;
      line-height: 1.14;
      font-weight: 800;
    }

    h1 {
      font-size: 34px;
    }

    h2 {
      font-size: 30px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 26px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .required {
      color: #ff3b30;
    }

    input {
      width: 100%;
      border: 2px solid #8d8d8d;
      border-radius: 18px;
      background: var(--input-bg);
      color: var(--input-text);
      padding: 20px 18px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #007aff;
      background: #ffffff;
    }

    .error {
      display: none;
      color: var(--error);
      font-size: 14px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .error.show {
      display: block;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: var(--yellow);
      color: #0b0b0b;
      font-weight: 800;
      font-size: 20px;
      padding: 20px 16px;
      cursor: pointer;
      margin-top: 12px;
      transition: transform 0.15s ease, opacity 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .button:active {
      transform: scale(0.985);
    }

    .button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .button-secondary {
      background: #181818;
      color: #ffffff;
      border: 1px solid #303030;
    }

    .button-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
      flex: 0 0 22px;
    }

    .question-title {
      font-size: 30px;
      line-height: 1.2;
      margin-bottom: 12px;
      font-weight: 800;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid var(--border);
      background: #0d0d0d;
      color: #ffffff;
      border-radius: 18px;
      padding: 18px 16px;
      font-size: 18px;
      text-align: left;
      cursor: pointer;
      line-height: 1.45;
      display: flex;
      align-items: center;
      gap: 14px;
      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        transform 0.16s ease;
      animation: neutralBreathLoop 2.1s ease-in-out infinite;
    }

    .answer-btn:hover,
    .answer-btn:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.04);
      outline: none;
      transform: translateY(-1px);
    }

    .answer-btn:active {
      transform: scale(0.992);
    }

    .answer-radio {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      flex: 0 0 22px;
      position: relative;
      transition:
        border-color 0.22s ease,
        background 0.22s ease,
        box-shadow 0.22s ease;
      background: transparent;
    }

    .answer-btn.selected {
      border-color: var(--yellow);
      background: var(--yellow-soft-2);
      box-shadow:
        0 0 0 4px var(--yellow-soft),
        0 0 18px rgba(246, 211, 0, 0.12);
      animation: selectedGlow 0.9s ease-in-out 1;
    }

    .answer-btn.selected .answer-radio {
      border-color: var(--yellow);
      background: var(--yellow);
      box-shadow: 0 0 0 5px rgba(246, 211, 0, 0.16);
    }

    .answer-btn.selected .answer-radio::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #111111;
    }

    .answer-btn.confirming {
      animation: confirmPulse 0.5s ease 2;
    }

    .answer-text {
      flex: 1;
    }

    .result-box {
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      border-radius: 18px;
      padding: 20px;
      margin-top: 10px;
    }

    .small-note {
      color: #d2d2d2;
      font-size: 16px;
      line-height: 1.6;
    }

    .warning-highlight {
      margin-top: 16px;
      border: 1px solid rgba(246, 211, 0, 0.35);
      background: rgba(246, 211, 0, 0.08);
      border-radius: 16px;
      padding: 14px 14px 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      box-shadow: 0 0 0 1px rgba(246, 211, 0, 0.08);
      animation: attentionPulse 1.7s ease-in-out infinite;
    }

    .warning-icon {
      font-size: 20px;
      line-height: 1;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .warning-text {
      color: #fff4a8;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 6px;
    }

    @keyframes neutralBreathLoop {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
      50% {
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    @keyframes confirmPulse {
      0% { transform: scale(1); }
      25% { transform: scale(1.012); }
      50% { transform: scale(0.998); }
      75% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }

    @keyframes selectedGlow {
      0% {
        box-shadow: 0 0 0 0 rgba(246, 211, 0, 0);
      }
      50% {
        box-shadow:
          0 0 0 5px rgba(246, 211, 0, 0.18),
          0 0 24px rgba(246, 211, 0, 0.14);
      }
      100% {
        box-shadow:
          0 0 0 4px rgba(246, 211, 0, 0.16),
          0 0 18px rgba(246, 211, 0, 0.12);
      }
    }

    @keyframes attentionPulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(246, 211, 0, 0.00);
      }
      50% {
        transform: scale(1.008);
        box-shadow: 0 0 0 5px rgba(246, 211, 0, 0.08);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(246, 211, 0, 0.00);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"></div>
  </div>

  <script>
    const CONFIG = {
      whatsappNumber: "5531991741433",
      whatsappIconUrl: "whatsapp.webp",
      appsScriptUrl: "",
      titleLeadForm: "Antes de continuar, me diga como posso falar com você 👇",
      subtitleLeadForm: "Leva menos de 10 segundos."
    };

    const state = {
      lead: {
        nome: "",
        whatsapp: "",
        email: ""
      },
      answers: {
        p1: "",
        p2: "",
        p3: "",
        p4: "",
        p5: "",
        p6: "",
        p7: ""
      },
      currentStep: "lead",
      finalType: "",
      utms: {},
      origin: ""
    };

    const DDD_VALIDOS = new Set([
      "11","12","13","14","15","16","17","18","19",
      "21","22","24",
      "27","28",
      "31","32","33","34","35","37","38",
      "41","42","43","44","45","46",
      "47","48","49",
      "51","53","54","55",
      "61",
      "62","63","64","65","66","67","68","69",
      "71","73","74","75","77","79",
      "81","82","83","84","85","86","87","88","89",
      "91","92","93","94","95","96","97","98","99"
    ]);

    const QUIZ = {
      p1: {
        title: "Qual é o seu motivo de contato hoje com um Consultor do PagBank?",
        options: [
          { label: "🤑 Comprar maquininha PagBank", short: "Comprar Pag", next: "p3" },
          { label: "🛠 Preciso de suporte (taxas, entrega, uso)", short: "Suporte", next: "p2" },
          { label: "💳 Crédito ou cartão (empréstimo, limite)", short: "Crédito/cartão", next: "p2" }
        ]
      },

      p2: {
        title: "Este canal é exclusivo para vendas de maquininhas do PagBank, para outros assuntos, fale com a Central pelo telefone 0800-728-2174 (opção 7, depois opção 2).",
        options: [
          { label: "✅ Entendi, finalizar perguntas.", short: "Entendi", next: "e3" },
          { label: "🛍️ Ótimo, comprar maquininha", short: "Comprar maquininha", next: "p3" }
        ]
      },

      p3: {
        title: "Você já teve uma maquininha PagBank no seu CPF ou CNPJ?",
        options: [
          { label: "❌ Nunca.", short: "Nunca", next: "p5" },
          { label: "⏸ Já tive/tenho, porém não uso há mais de 6 meses.", short: "Sem uso +6m", next: "p5" },
          { label: "✅ Tenho e uso atualmente.", short: "Tenho e uso", next: "p4" }
        ]
      },

      p4: {
        title: "Você tem algum CPF ou CNPJ que nunca teve maquininha PagBank ou está sem uso há mais de 6 meses para aproveitar essa oferta?",
        options: [
          { label: "✅ Sim", short: "Sim", next: "p5" },
          { label: "❌ Não", short: "Não", next: "e2" }
        ]
      },

      p5: {
        title: "Qual é o seu faturamento médio mensal atualmente?",
        options: [
          { label: "💰 Acima de R$ 2.000", short: "Acima de 2k", next: "p6" },
          { label: "💰 Acima de R$ 5.000", short: "Acima de 5k", next: "p6" },
          { label: "💰 Acima de R$ 10.000", short: "Acima de 10k", next: "p6" },
          { label: "💰 Acima de R$ 20.000", short: "Acima de 20k", next: "p6" },
          { label: "💰 Acima de R$ 40.000", short: "Acima de 40k", next: "p6" },
          { label: "💰 Acima de R$ 80.000", short: "Acima de 80k", next: "p6" },
          { label: "⬇️ Até R$ 2.000", short: "Até 2k", next: "p6" }
        ]
      },

      p6: {
        title: "Quando você pretende comprar a maquininha do PagBank?",
        options: [
          { label: "🚀 Preciso para esta semana.", short: "Esta semana", next: "p7" },
          { label: "📅 Preciso para este mês.", short: "Este mês", next: "p7" },
          { label: "🔎 Estou pesquisando preços e taxas.", short: "Pesq. preç. e tx", next: "p7" }
        ]
      },

      p7: {
        title: "Qual valor você tem disponível hoje para investir em uma maquininha do PagBank?",
        options: [
          { label: "🤑 R$ 59 ou mais", short: "R$ 59+", next: "e1" },
          { label: "🤑 R$ 109 ou mais", short: "R$ 109+", next: "e1" },
          { label: "🤑 R$ 199 ou mais", short: "R$ 199+", next: "e1" },
          { label: "⬇️ Até R$ 59", short: "Até R$ 59", next: "e2" }
        ]
      }
    };

    const app = document.getElementById("app");

    function render() {
      window.scrollTo({ top: 0, behavior: "smooth" });

      if (state.currentStep === "lead") {
        renderLeadForm();
        return;
      }

      if (QUIZ[state.currentStep]) {
        renderQuestion(state.currentStep);
        return;
      }

      if (state.currentStep === "e1") {
        renderResultQualified();
        return;
      }

      if (state.currentStep === "e2") {
        renderResultDisqualified();
        return;
      }

      if (state.currentStep === "e3") {
        renderResultCloseFlow();
      }
    }

    function renderLeadForm() {
      app.innerHTML = `
        <div>
          <h1>${CONFIG.titleLeadForm}</h1>
          <div class="subtitle">${CONFIG.subtitleLeadForm}</div>

          <form id="formQuizDenver" novalidate>
            <div class="field">
              <label for="nome">Primeiro nome <span class="required">*</span></label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Digite apenas o seu primeiro nome"
                autocomplete="given-name"
                value="${escapeHtml(state.lead.nome)}"
              />
              <div class="error" id="error-nome"></div>
            </div>

            <div class="field">
              <label for="whatsapp">WhatsApp <span class="required">*</span></label>
              <input
                type="tel"
                id="whatsapp"
                name="whatsapp"
                placeholder="(DDD) 9 0000-0000"
                inputmode="numeric"
                autocomplete="tel"
                value="${escapeHtml(formatPhone(state.lead.whatsapp))}"
              />
              <div class="error" id="error-whatsapp"></div>
            </div>

            <div class="field">
              <label for="email">E-mail <span class="required">*</span></label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seuemail@gmail.com"
                autocomplete="email"
                value="${escapeHtml(state.lead.email)}"
              />
              <div class="error" id="error-email"></div>
            </div>

            <button type="submit" class="button" id="btnNextLead">PRÓXIMO</button>
          </form>
        </div>
      `;

      const form = document.getElementById("formQuizDenver");
      const nomeInput = document.getElementById("nome");
      const whatsappInput = document.getElementById("whatsapp");
      const emailInput = document.getElementById("email");
      const btnNextLead = document.getElementById("btnNextLead");

      nomeInput.addEventListener("input", handleNameInputFormat);
      whatsappInput.addEventListener("input", handlePhoneInputMask);

      nomeInput.addEventListener("blur", () => validateNome(true));
      whatsappInput.addEventListener("blur", () => validateWhatsapp(true));
      emailInput.addEventListener("blur", () => validateEmail(true));

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        state.lead.nome = normalizeName(nomeInput.value.trim());
        state.lead.whatsapp = onlyDigits(whatsappInput.value);
        state.lead.email = emailInput.value.trim();

        nomeInput.value = state.lead.nome;

        const nomeOk = validateNome(true);
        const whatsappOk = validateWhatsapp(true);
        const emailOk = validateEmail(true);

        if (!nomeOk || !whatsappOk || !emailOk) return;

        btnNextLead.disabled = true;
        btnNextLead.textContent = "CARREGANDO...";

        pushDataLayerEvent("quiz_contact_step_completed", {
          nome: state.lead.nome,
          whatsapp: state.lead.whatsapp,
          email: state.lead.email
        });

        await sendToAppsScript("lead_form_completed");

        state.currentStep = "p1";
        render();
      });
    }

    function renderQuestion(stepKey) {
      const question = QUIZ[stepKey];

      app.innerHTML = `
        <div>
          <div class="question-title">${question.title}</div>
          <div class="answers">
            ${question.options.map((option, index) => `
              <button
                class="answer-btn"
                type="button"
                data-step="${stepKey}"
                data-index="${index}"
              >
                <span class="answer-radio"></span>
                <span class="answer-text">${option.label}</span>
              </button>
            `).join("")}
          </div>
        </div>
      `;

      document.querySelectorAll(".answer-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (btn.dataset.locked === "1") return;
          btn.dataset.locked = "1";

          const step = btn.getAttribute("data-step");
          const index = Number(btn.getAttribute("data-index"));
          const selected = QUIZ[step].options[index];

          document.querySelectorAll(".answer-btn").forEach((item) => {
            item.style.pointerEvents = "none";
          });

          btn.classList.add("selected", "confirming");
          state.answers[step] = selected.short;

          pushDataLayerEvent("quiz_answer", {
            step,
            answer: selected.short,
            next_step: selected.next
          });

          await sendToAppsScript("quiz_answer", {
            answered_step: step,
            answered_value: selected.short,
            next_step: selected.next
          });

          setTimeout(() => {
            state.currentStep = selected.next;

            if (selected.next === "e1") state.finalType = "qualified";
            if (selected.next === "e2") state.finalType = "disqualified";
            if (selected.next === "e3") state.finalType = "closed";

            render();
          }, 700);
        });
      });
    }

    function renderResultQualified() {
      const firstName = getFirstName(state.lead.nome);

      app.innerHTML = `
        <div>
          <h2>Tudo certo por aqui, ${escapeHtml(firstName)}!</h2>
          <div class="subtitle">
            Clique no botão abaixo para comprar agora a sua maquininha do PagBank.
          </div>

          <div class="result-box">
            <div class="small-note">
              Suas respostas foram organizadas para facilitar o atendimento.
            </div>

            <div class="warning-highlight">
              <div class="warning-icon">⚠️</div>
              <div class="warning-text">
                Não apague a mensagem automática que será enviada no WhatsApp.
                Ela ajuda a agilizar e facilitar o seu atendimento.
              </div>
            </div>
          </div>

          <button class="button" id="btnWhatsQualified">
            ${buildWhatsAppIconHtml()}
            <span>ENVIAR MENSAGEM</span>
          </button>
        </div>
      `;

      document.getElementById("btnWhatsQualified").addEventListener("click", async () => {
        pushDataLayerEvent("quiz_whatsapp_click", {
          destination: "qualified",
          final_type: "qualified"
        });

        await sendToAppsScript("quiz_finished", {
          final_type: "qualified"
        });

        openWhatsApp("qualified");
      });
    }

    function renderResultDisqualified() {
      app.innerHTML = `
        <div>
          <h2>Agradecemos pelas respostas</h2>
          <div class="subtitle">
            Infelizmente, pelas informações que você nos passou, o PagBank não será a opção ideal para você neste momento.
            <br><br>
            No entanto, também trabalhamos com o Mercado Pago e outras soluções, que talvez atendam melhor sua necessidade,
            desde que você nunca tenha trabalhado com elas e tenha a partir de R$ 130,00 para investir em uma maquininha.
            <br><br>
            Caso você atenda a esses requisitos, clique no botão abaixo para saber mais.
          </div>

          <div class="button-stack">
            <button class="button button-secondary" id="btnCloseDisqualified">FECHAR FORMULÁRIO</button>

            <button class="button" id="btnWhatsDisqualified">
              ${buildWhatsAppIconHtml()}
              <span>VER OUTRAS PROPOSTAS</span>
            </button>
          </div>
        </div>
      `;

      document.getElementById("btnCloseDisqualified").addEventListener("click", async () => {
        pushDataLayerEvent("quiz_closed_flow", {
          final_type: "disqualified_closed",
          origin_detected: state.origin || ""
        });

        await sendToAppsScript("quiz_finished", {
          final_type: "disqualified_closed"
        });

        exitSiteByOrigin();
      });

      document.getElementById("btnWhatsDisqualified").addEventListener("click", async () => {
        pushDataLayerEvent("quiz_whatsapp_click", {
          destination: "disqualified",
          final_type: "disqualified"
        });

        await sendToAppsScript("quiz_finished", {
          final_type: "disqualified"
        });

        openWhatsApp("disqualified");
      });
    }

    function renderResultCloseFlow() {
      app.innerHTML = `
        <div>
          <h2>Agradeço pelas respostas!</h2>
          <div class="subtitle">
            Este canal é exclusivo para pedidos de maquininhas PagBank.
          </div>

          <button class="button button-secondary" id="btnCloseFlow">FECHAR FORMULÁRIO</button>
        </div>
      `;

      document.getElementById("btnCloseFlow").addEventListener("click", async () => {
        pushDataLayerEvent("quiz_closed_flow", {
          final_type: "closed",
          origin_detected: state.origin || ""
        });

        await sendToAppsScript("quiz_finished", {
          final_type: "closed"
        });

        exitSiteByOrigin();
      });
    }

    function buildWhatsAppIconHtml() {
      return `<img src="${escapeHtml(CONFIG.whatsappIconUrl)}" alt="" class="button-icon" />`;
    }

    function openWhatsApp(type) {
      const message = buildWhatsAppMessage(type);
      const url = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(message)}`;
      window.location.href = url;
    }

    function buildWhatsAppMessage(type) {
      const firstName = getFirstName(state.lead.nome);
      const lines = [];

      lines.push(`Olá Denver, me chamo ${firstName}.`);
      lines.push("");

      if (type === "disqualified") {
        lines.push("Respondi o formulário no site e gostaria de mais informações sobre outras maquininhas.");
      } else {
        lines.push("Respondi o formulário no site e gostaria de mais informações sobre o PagBank.");
      }

      lines.push("");

      if (state.answers.p1) lines.push(`Mot. Ctt: ${state.answers.p1}`);
      if (state.answers.p2) lines.push(`Canal excl.: ${state.answers.p2}`);
      if (state.answers.p3) lines.push(`Já teve Pag: ${state.answers.p3}`);
      if (state.answers.p4) lines.push(`Tem CPF/CNPJ apto: ${state.answers.p4}`);
      if (state.answers.p5) lines.push(`Fat.: ${state.answers.p5}`);
      if (state.answers.p6) lines.push(`Qnd pret. comp.: ${state.answers.p6}`);
      if (state.answers.p7) lines.push(`Valor disp.: ${state.answers.p7}`);

      return lines.join("\n");
    }

    function validateNome(showError = false) {
      const input = document.getElementById("nome");
      const value = normalizeName(input.value.trim());
      const errorEl = document.getElementById("error-nome");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu primeiro nome.";
      } else if (value.length < 2) {
        valid = false;
        message = "Digite seu primeiro nome.";
      } else if (!/^[A-Za-zÀ-ÿ]+$/.test(value)) {
        valid = false;
        message = "Use apenas letras no nome.";
      } else if (!hasValidNameStructure(value)) {
        valid = false;
        message = "Digite um primeiro nome válido.";
      }

      setErrorState(errorEl, valid, message, showError);
      return valid;
    }

    function validateWhatsapp(showError = false) {
      const value = onlyDigits(document.getElementById("whatsapp").value);
      const errorEl = document.getElementById("error-whatsapp");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu WhatsApp.";
      } else if (value.length !== 11) {
        valid = false;
        message = "Digite um WhatsApp válido com DDD.";
      } else {
        const ddd = value.slice(0, 2);
        const mobile = value.slice(2);
        const last4 = value.slice(-4);

        if (!DDD_VALIDOS.has(ddd)) {
          valid = false;
          message = "Digite um DDD válido.";
        } else if (mobile.charAt(0) !== "9") {
          valid = false;
          message = "Digite um número de celular com 9 após o DDD.";
        } else if (/^(\d)\1{10}$/.test(value)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        } else if (isSequential(mobile)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        } else if (["0000", "1111", "2222", "3333", "4444", "5555", "6666", "7777", "8888", "9999", "1234", "4321"].includes(last4)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        } else if (/^9(?:12345678|00000000|11111111)$/.test(mobile)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        }
      }

      setErrorState(errorEl, valid, message, showError);
      return valid;
    }

    function validateEmail(showError = false) {
      const value = document.getElementById("email").value.trim();
      const errorEl = document.getElementById("error-email");

      let valid = true;
      let message = "";

      const blockedEmails = ["teste@teste.com", "asd@asd.com", "aaa@aaa.com"];
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i;

      if (!value) {
        valid = false;
        message = "Digite seu e-mail.";
      } else if (!emailRegex.test(value)) {
        valid = false;
        message = "Digite um e-mail válido.";
      } else if (blockedEmails.includes(value.toLowerCase())) {
        valid = false;
        message = "Digite um e-mail válido.";
      }

      setErrorState(errorEl, valid, message, showError);
      return valid;
    }

    function setErrorState(errorEl, valid, message, showError) {
      if (!showError) return;

      if (valid) {
        errorEl.textContent = "";
        errorEl.classList.remove("show");
      } else {
        errorEl.textContent = message;
        errorEl.classList.add("show");
      }
    }

    function handlePhoneInputMask(e) {
      let digits = onlyDigits(e.target.value);
      if (digits.length > 11) digits = digits.slice(0, 11);
      e.target.value = formatPhone(digits);
    }

    function handleNameInputFormat(e) {
      const raw = String(e.target.value || "");
      const digitsRemoved = raw.replace(/\d/g, "");
      const noExtraSpaces = digitsRemoved.replace(/\s+/g, " ");
      const onlyFirstWord = noExtraSpaces.trim().split(" ")[0] || "";
      const onlyLetters = onlyFirstWord.replace(/[^A-Za-zÀ-ÿ]/g, "");
      e.target.value = capitalizeWord(onlyLetters);
    }

    function normalizeName(value) {
      const firstWord = String(value || "")
        .replace(/\d/g, "")
        .replace(/[^A-Za-zÀ-ÿ\s]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .filter(Boolean)[0] || "";

      return capitalizeWord(firstWord);
    }

    function capitalizeWord(word) {
      const clean = String(word || "").toLowerCase();
      return clean.charAt(0).toUpperCase() + clean.slice(1);
    }

    function getFirstName(value) {
      const normalized = normalizeName(value);
      return normalized || "por aqui";
    }

    function hasValidNameStructure(name) {
      const clean = String(name || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();

      const blockedExact = new Set([
        "teste", "teste1", "admin", "nome", "usuario", "user",
        "asdf", "asdfg", "qwer", "qwert", "qwerty",
        "zxcv", "zxcvb", "zxcvbn", "abc", "abcd",
        "kkk", "kkkk", "aaaa", "bbbb", "cccc", "xxxxx", "xxx"
      ]);

      const blockedContains = ["asdf", "qwer", "zxcv", "teste", "admin", "qaz", "wsx", "edc"];

      if (blockedExact.has(clean)) return false;
      if (blockedContains.some(pattern => clean.includes(pattern))) return false;
      if (!/[aeiou]/.test(clean)) return false;
      if (/[bcdfghjklmnpqrstvwxyz]{5,}/.test(clean)) return false;
      if (/([a-z])\1{3,}/.test(clean)) return false;
      if (new Set(clean.split("")).size <= 2) return false;

      return true;
    }

    function formatPhone(value) {
      const digits = onlyDigits(value);

      if (!digits) return "";
      if (digits.length <= 2) return `(${digits}`;
      if (digits.length <= 7) return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
      return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7, 11)}`;
    }

    function onlyDigits(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function isSequential(value) {
      const asc = "0123456789";
      const desc = "9876543210";

      for (let i = 0; i <= asc.length - value.length; i++) {
        if (asc.slice(i, i + value.length) === value) return true;
      }

      for (let i = 0; i <= desc.length - value.length; i++) {
        if (desc.slice(i, i + value.length) === value) return true;
      }

      return false;
    }

    function captureUTMs() {
      const params = new URLSearchParams(window.location.search);

      state.utms = {
        utm_source: params.get("utm_source") || "",
        utm_medium: params.get("utm_medium") || "",
        utm_campaign: params.get("utm_campaign") || "",
        utm_content: params.get("utm_content") || "",
        utm_term: params.get("utm_term") || "",
        fbclid: params.get("fbclid") || "",
        gclid: params.get("gclid") || "",
        ttclid: params.get("ttclid") || ""
      };
    }

    function detectOrigin() {
      const ref = (document.referrer || "").toLowerCase();
      state.origin = ref;
      sessionStorage.setItem("quiz_referrer", ref);
    }

    function exitSiteByOrigin() {
      const ref = sessionStorage.getItem("quiz_referrer") || state.origin || "";

      if (window.history.length > 1) {
        history.back();
        setTimeout(() => {
          fallbackExit(ref);
        }, 900);
        return;
      }

      fallbackExit(ref);
    }

    function fallbackExit(ref) {
      const origin = String(ref || "").toLowerCase();
      const utmSource = String(state.utms.utm_source || "").toLowerCase();

      if (origin.includes("instagram") || utmSource.includes("instagram")) {
        window.location.href = "https://www.instagram.com/";
        return;
      }

      if (origin.includes("facebook") || origin.includes("fb") || utmSource.includes("facebook")) {
        window.location.href = "https://www.facebook.com/";
        return;
      }

      if (origin.includes("tiktok") || utmSource.includes("tiktok")) {
        window.location.href = "https://www.tiktok.com/";
        return;
      }

      if (origin.includes("google") || utmSource.includes("google")) {
        window.location.href = "https://www.google.com/";
        return;
      }

      window.location.href = "about:blank";
    }

    function pushDataLayerEvent(eventName, extra = {}) {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: eventName,
        nome: state.lead.nome || "",
        whatsapp: state.lead.whatsapp || "",
        email: state.lead.email || "",
        p1: state.answers.p1 || "",
        p2: state.answers.p2 || "",
        p3: state.answers.p3 || "",
        p4: state.answers.p4 || "",
        p5: state.answers.p5 || "",
        p6: state.answers.p6 || "",
        p7: state.answers.p7 || "",
        ...state.utms,
        ...extra
      });
    }

    async function sendToAppsScript(eventType, extra = {}) {
      if (!CONFIG.appsScriptUrl) return;

      const payload = {
        event_type: eventType,
        timestamp: new Date().toISOString(),
        nome: state.lead.nome || "",
        whatsapp: state.lead.whatsapp || "",
        email: state.lead.email || "",
        p1: state.answers.p1 || "",
        p2: state.answers.p2 || "",
        p3: state.answers.p3 || "",
        p4: state.answers.p4 || "",
        p5: state.answers.p5 || "",
        p6: state.answers.p6 || "",
        p7: state.answers.p7 || "",
        final_type: state.finalType || "",
        page_url: window.location.href,
        user_agent: navigator.userAgent,
        referrer: state.origin || "",
        ...state.utms,
        ...extra
      };

      try {
        await fetch(CONFIG.appsScriptUrl, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        console.error("Erro ao enviar para Apps Script:", error);
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    captureUTMs();
    detectOrigin();
    pushDataLayerEvent("quiz_start");
    render();
  </script>
</body>
