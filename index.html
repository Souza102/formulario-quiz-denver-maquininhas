<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário / Quiz - Denver Maquininhas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --card: #0b0b0b;
      --card-2: #111111;
      --text: #ffffff;
      --muted: #d4d4d4;
      --muted-2: #a8a8a8;
      --border: #303030;
      --border-hover: #4b4b4b;
      --input-bg: #f0f0f0;
      --input-text: #111111;
      --yellow: #f6d300;
      --yellow-2: #ffe55c;
      --yellow-soft: rgba(246, 211, 0, 0.18);
      --yellow-soft-2: rgba(246, 211, 0, 0.08);
      --green-soft: rgba(44, 186, 93, 0.12);
      --green-strong-soft: rgba(44, 186, 93, 0.16);
      --red: #ff3b30;
      --red-2: #d93025;
      --red-soft: rgba(255, 59, 48, 0.12);
      --blue-focus: #3b82f6;
      --shadow-soft: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #101010 0%, #000000 48%, #000000 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 28px 18px 50px;
      overflow-x: hidden;
    }

    body.modal-open {
      overflow: hidden;
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
      position: relative;
    }

    .app-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 26px;
      padding: 24px 18px 22px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(6px);
      position: relative;
      overflow: hidden;
    }

    .app-shell::before {
      content: "";
      position: absolute;
      inset: -80px auto auto -80px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(246,211,0,0.14) 0%, rgba(246,211,0,0) 72%);
      pointer-events: none;
    }

    .app-shell::after {
      content: "";
      position: absolute;
      inset: auto -100px -100px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(246,211,0,0.08) 0%, rgba(246,211,0,0) 70%);
      pointer-events: none;
    }

    .progress-wrap {
      margin-bottom: 20px;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--yellow), #ffe96d);
      box-shadow: 0 0 18px rgba(246, 211, 0, 0.4);
      transition: width 0.42s ease;
    }

    h1, h2, h3 {
      margin: 0 0 12px;
      line-height: 1.14;
      font-weight: 800;
    }

    h1 {
      font-size: 32px;
    }

    h2 {
      font-size: 28px;
    }

    h3 {
      font-size: 22px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.25;
    }

    .required {
      color: var(--red);
    }

    input {
      width: 100%;
      border: 2px solid #8c8c8c;
      border-radius: 18px;
      background: var(--input-bg);
      color: var(--input-text);
      padding: 18px 16px;
      font-size: 18px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, transform 0.12s ease;
    }

    input:focus {
      border-color: var(--blue-focus);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.14);
    }

    input.valid {
      border-color: #26a65b;
      box-shadow: 0 0 0 4px rgba(38,166,91,0.12);
    }

    input.invalid {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(255,59,48,0.12);
    }

    .error {
      display: none;
      color: #ff7f78;
      font-size: 14px;
      margin-top: 8px;
      line-height: 1.45;
      font-weight: 700;
    }

    .error.show {
      display: block;
    }

    .helper {
      color: var(--muted-2);
      font-size: 13px;
      line-height: 1.55;
      margin-top: 8px;
    }

    .lgpd-note {
      margin-top: 10px;
      color: #dcdcdc;
      font-size: 13px;
      line-height: 1.6;
      padding: 12px 13px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 16px;
      background: var(--yellow);
      color: #0b0b0b;
      font-weight: 900;
      font-size: 19px;
      padding: 18px 16px;
      cursor: pointer;
      margin-top: 12px;
      transition: transform 0.14s ease, opacity 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      box-shadow: 0 10px 28px rgba(246, 211, 0, 0.16);
    }

    .button:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .button:active {
      transform: scale(0.985);
    }

    .button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      filter: grayscale(0.08);
    }

    .button-secondary {
      background: #181818;
      color: #ffffff;
      border: 1px solid #303030;
      box-shadow: none;
    }

    .button-danger {
      background: linear-gradient(180deg, #ff5347 0%, #d93025 100%);
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(217, 48, 37, 0.22);
    }

    .button-danger:hover {
      filter: brightness(1.04);
    }

    .button-outline {
      background: transparent;
      border: 2px solid #404040;
      color: #cfcfcf;
      box-shadow: none;
    }

    .button-outline:hover {
      border-color: #6a6a6a;
      color: #ffffff;
      background: rgba(255,255,255,0.02);
      filter: none;
    }

    .button-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
      flex: 0 0 24px;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 6px;
    }

    .question-title {
      font-size: 29px;
      line-height: 1.18;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid var(--border);
      background: linear-gradient(180deg, #0d0d0d 0%, #111111 100%);
      color: #ffffff;
      border-radius: 18px;
      padding: 18px 16px;
      font-size: 18px;
      text-align: left;
      cursor: pointer;
      line-height: 1.45;
      display: flex;
      align-items: center;
      gap: 14px;
      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        transform 0.16s ease;
      animation: neutralBreathLoop 2.2s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .answer-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(246,211,0,0) 0%, rgba(246,211,0,0.07) 50%, rgba(246,211,0,0) 100%);
      transform: translateX(-115%);
      pointer-events: none;
    }

    .answer-btn:hover,
    .answer-btn:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.04);
      outline: none;
      transform: translateY(-1px);
    }

    .answer-btn:active {
      transform: scale(0.992);
    }

    .answer-radio {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      flex: 0 0 22px;
      position: relative;
      transition: border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      background: transparent;
    }

    .answer-btn.selected {
      border-color: var(--yellow);
      background: var(--yellow-soft-2);
      box-shadow:
        0 0 0 4px var(--yellow-soft),
        0 0 22px rgba(246, 211, 0, 0.14);
      animation: selectedGlow 0.9s ease-in-out 1;
    }

    .answer-btn.selected::after {
      animation: shineAcross 0.7s ease 1;
    }

    .answer-btn.selected .answer-radio {
      border-color: var(--yellow);
      background: var(--yellow);
      box-shadow: 0 0 0 5px rgba(246,211,0,0.16);
    }

    .answer-btn.selected .answer-radio::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #111111;
    }

    .answer-btn.confirming {
      animation: confirmPulse 0.55s ease 2;
    }

    .answer-text {
      flex: 1;
    }

    .result-box,
    .info-box {
      background: linear-gradient(180deg, #0f0f0f 0%, #131313 100%);
      border: 1px solid #2d2d2d;
      border-radius: 18px;
      padding: 18px;
      margin-top: 12px;
    }

    .small-note {
      color: #d2d2d2;
      font-size: 15px;
      line-height: 1.6;
    }

    .warning-highlight {
      margin-top: 16px;
      border: 1px solid rgba(246, 211, 0, 0.35);
      background: rgba(246, 211, 0, 0.08);
      border-radius: 16px;
      padding: 14px 14px 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      box-shadow: 0 0 0 1px rgba(246, 211, 0, 0.08);
      animation: attentionPulse 1.8s ease-in-out infinite;
    }

    .warning-icon {
      font-size: 20px;
      line-height: 1;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .warning-text {
      color: #fff4a8;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .disqualified-hero {
      margin-top: 6px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.07);
      position: relative;
      overflow: hidden;
    }

    .disqualified-hero::before {
      content: "";
      position: absolute;
      inset: auto -60px -60px auto;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(246,211,0,0.14), rgba(246,211,0,0));
      pointer-events: none;
    }

    .positive-box {
      margin-top: 16px;
      border: 1px solid rgba(44,186,93,0.45);
      background: rgba(44,186,93,0.15);
      border-radius: 16px;
      padding: 16px;
      color: #d9ffe8;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 700;
      box-shadow: 0 0 0 2px rgba(44,186,93,0.10);
    }

    .highlight-list {
      display: grid;
      gap: 10px;
      margin: 18px 0 6px;
    }

    .highlight-item {
      background: rgba(246,211,0,0.07);
      border: 1px solid rgba(246,211,0,0.18);
      color: #fff8bf;
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    .choice-inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .toggle-btn {
      width: 100%;
      border: 2px solid #303030;
      background: #101010;
      color: #ffffff;
      border-radius: 16px;
      padding: 16px 12px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, transform 0.14s ease;
      animation: softInvite 2s ease-in-out infinite;
    }

    .toggle-btn:hover {
      border-color: #505050;
      transform: translateY(-1px);
    }

    .toggle-btn.active {
      border-color: var(--yellow);
      background: rgba(246,211,0,0.08);
      color: #ffffff;
      box-shadow: 0 0 0 4px rgba(246,211,0,0.12), 0 0 22px rgba(246,211,0,0.08);
      animation: selectedGlow 0.7s ease 1;
    }

    .pulse-invite {
      animation: invitePulse 1.5s ease-in-out infinite;
    }

    .pulse-danger {
      animation: dangerPulse 1.7s ease-in-out infinite;
    }

    .hidden {
      display: none !important;
    }

    .fade-in {
      animation: fadeSlideUp 0.35s ease both;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .modal-box {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(180deg, #111111 0%, #0a0a0a 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px 18px 18px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.5);
      animation: modalPop 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .modal-box::before {
      display: none;
    }

    .modal-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .modal-text {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .modal-text strong {
      color: #fff4a8;
      font-weight: 900;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .final-cta-box {
      margin-top: 14px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .inline-success {
      margin-top: 12px;
      color: #b8ffd1;
      background: var(--green-soft);
      border: 1px solid rgba(44,186,93,0.26);
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
    }

    @keyframes neutralBreathLoop {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
      50% { box-shadow: 0 0 0 3px rgba(255,255,255,0.03); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    @keyframes confirmPulse {
      0% { transform: scale(1); }
      25% { transform: scale(1.012); }
      50% { transform: scale(0.998); }
      75% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }

    @keyframes selectedGlow {
      0% { box-shadow: 0 0 0 0 rgba(246,211,0,0); }
      50% { box-shadow: 0 0 0 5px rgba(246,211,0,0.18), 0 0 24px rgba(246,211,0,0.14); }
      100% { box-shadow: 0 0 0 4px rgba(246,211,0,0.16), 0 0 18px rgba(246,211,0,0.12); }
    }

    @keyframes attentionPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(246,211,0,0); }
      50% { transform: scale(1.008); box-shadow: 0 0 0 5px rgba(246,211,0,0.08); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(246,211,0,0); }
    }

    @keyframes invitePulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(246,211,0,0); }
      50% { transform: scale(1.014); box-shadow: 0 0 0 6px rgba(246,211,0,0.12), 0 0 24px rgba(246,211,0,0.18); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(246,211,0,0); }
    }

    @keyframes dangerPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,59,48,0); }
      50% { transform: scale(1.01); box-shadow: 0 0 0 6px rgba(255,59,48,0.10), 0 0 24px rgba(255,59,48,0.16); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,59,48,0); }
    }

    @keyframes softInvite {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
      50% { box-shadow: 0 0 0 4px rgba(255,255,255,0.03); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    @keyframes shineAcross {
      0% { transform: translateX(-115%); }
      100% { transform: translateX(115%); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 540px) {
      body {
        padding: 18px 14px 36px;
      }

      .app-shell {
        padding: 20px 14px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 25px;
      }

      .question-title {
        font-size: 25px;
      }

      label {
        font-size: 19px;
      }

      input {
        font-size: 17px;
        padding: 17px 15px;
      }

      .answer-btn {
        font-size: 17px;
        padding: 16px 14px;
      }

      .button {
        font-size: 18px;
        padding: 17px 14px;
      }

      .modal-title {
        font-size: 24px;
      }

      .choice-inline {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

      if (state.currentStep === "d1") return attachDisqualifiedEvents();

    function attachLeadFormEvents() {
      const form = document.getElementById("formQuizDenver");
      const nomeInput = document.getElementById("nome");
      const whatsappInput = document.getElementById("whatsapp");
      const emailInput = document.getElementById("email");
      const btnNextLead = document.getElementById("btnNextLead");

      nomeInput.addEventListener("input", (e) => {
        handleNameInputFormat(e);
        state.lead.nome = normalizeName(e.target.value);
        validateNome(false);
      });

      whatsappInput.addEventListener("input", (e) => {
        handlePhoneInputMask(e);
        state.lead.whatsapp = normalizeBrazilPhoneInput(e.target.value);
        validateWhatsapp(false);
      });

      emailInput.addEventListener("keydown", (e) => {
        if (e.key === " ") e.preventDefault();
      });

      emailInput.addEventListener("input", (e) => {
        const normalizedEmail = normalizeEmail(e.target.value);
        e.target.value = normalizedEmail;
        state.lead.email = normalizedEmail;
        validateEmail(false);
      });

      nomeInput.addEventListener("blur", () => validateNome(true));

      whatsappInput.addEventListener("blur", () => {
        const digits = normalizeBrazilPhoneInput(whatsappInput.value);
        state.lead.whatsapp = digits;
        whatsappInput.value = formatPhone(digits);
        validateWhatsapp(true);
      });

      emailInput.addEventListener("blur", () => {
        const normalizedEmail = normalizeEmail(emailInput.value);
        emailInput.value = normalizedEmail;
        state.lead.email = normalizedEmail;
        validateEmail(true);
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        state.lead.nome = normalizeName(nomeInput.value.trim());
        state.lead.whatsapp = normalizeBrazilPhoneInput(whatsappInput.value);
        state.lead.email = normalizeEmail(emailInput.value);

        nomeInput.value = state.lead.nome;
        whatsappInput.value = formatPhone(state.lead.whatsapp);
        emailInput.value = state.lead.email;

        const nomeOk = validateNome(true);
        const whatsappOk = validateWhatsapp(true);
        const emailOk = validateEmail(true);

        if (!nomeOk || !whatsappOk || !emailOk) return;

        btnNextLead.disabled = true;
        btnNextLead.textContent = "CARREGANDO...";

        pushDataLayerEvent("quiz_contact_step_completed", {
          nome: state.lead.nome,
          whatsapp: state.lead.whatsapp,
          email: state.lead.email
        });

        await sendToAppsScript("lead_form_completed");

        state.currentStep = "p1";
        render();
      });
    }

    function attachQuestionEvents() {
      document.querySelectorAll(".answer-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (btn.dataset.locked === "1") return;
          btn.dataset.locked = "1";

          const step = btn.getAttribute("data-step");
          const index = Number(btn.getAttribute("data-index"));
          const selected = QUIZ[step].options[index];

          document.querySelectorAll(".answer-btn").forEach((item) => {
            item.style.pointerEvents = "none";
          });

          btn.classList.add("selected", "confirming");
          state.answers[step] = selected.whatsappLabel;

          pushDataLayerEvent("quiz_answer", {
            step,
            answer: selected.short,
            next_step: selected.next
          });

          await sendToAppsScript("quiz_answer", {
            answered_step: step,
            answered_value: selected.short,
            next_step: selected.next
          });

          setTimeout(() => {
            state.currentStep = selected.next;

            if (selected.next === "e1") state.finalType = "qualified";
            if (selected.next === "d1") state.finalType = "disqualified";
            if (selected.next === "e3") state.finalType = "closed";

            render();
          }, 700);
        });
      });
    }

    function attachQualifiedEvents() {
      const btn = document.getElementById("btnWhatsQualified");
      if (!btn) return;

      btn.addEventListener("click", async () => {
        pushDataLayerEvent("quiz_whatsapp_click", {
          destination: "qualified",
          final_type: "qualified"
        });

        await sendToAppsScript("quiz_finished", {
          final_type: "qualified"
        });

        openWhatsApp("qualified");
      });

    function attachDisqualifiedEvents() {
      const btnOther = document.getElementById("btnOtherProposalsStart");
      const btnClose = document.getElementById("btnCloseDisqualified");

      if (btnOther) {
        btnOther.addEventListener("click", async () => {
          pushDataLayerEvent("quiz_disqualified_interest_recovered", {
            source_step: "d1"
          });

          await sendToAppsScript("quiz_disqualified_other_proposals", {
            source_step: "d1"

          render();

      if (btnClose) {

    function attachAlternativeProposalEvents() {
      const form = document.getElementById("formAlternativeProposal");
      const cpfInput = document.getElementById("cpf");
      const cnpjInput = document.getElementById("cnpj");

      if (cpfInput) {
        cpfInput.addEventListener("input", (e) => {
          const digits = onlyDigits(e.target.value).slice(0, 11);
          state.alternate.cpf = digits;
          e.target.value = formatCPF(digits);
          validateCPFField(false);
          syncAlternativeProposalUI();
        });

        cpfInput.addEventListener("blur", () => {
          cpfInput.value = formatCPF(state.alternate.cpf);
          validateCPFField(true);
          syncAlternativeProposalUI();
        });
      }

      document.querySelectorAll("[data-has-cnpj]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.alternate.hasCnpj = btn.getAttribute("data-has-cnpj");

          if (state.alternate.hasCnpj === "Não") {
            state.alternate.cnpj = "";
            const cnpj = document.getElementById("cnpj");
            if (cnpj) {
              cnpj.value = "";
              cnpj.classList.remove("valid", "invalid");
            }
            const errorCnpj = document.getElementById("error-cnpj");
            if (errorCnpj) {
              errorCnpj.textContent = "";
              errorCnpj.classList.remove("show");
            }
          }

          pushDataLayerEvent("quiz_alternate_has_cnpj_selected", {
            has_cnpj: state.alternate.hasCnpj
          });

          syncAlternativeProposalUI();

          if (state.alternate.hasCnpj === "Sim") {
            setTimeout(() => {
              const cnpjField = document.getElementById("cnpj");
              if (cnpjField) {
                cnpjField.focus();
                const valueLength = cnpjField.value.length;
                cnpjField.setSelectionRange(valueLength, valueLength);
              }
            }, 120);
          }
        });
      });

      if (cnpjInput) {
        cnpjInput.addEventListener("input", (e) => {
          const normalized = normalizeCNPJInput(e.target.value);
          state.alternate.cnpj = normalized;
          e.target.value = formatCNPJ(normalized);
          validateCNPJField(false);
          syncAlternativeProposalUI();
        });

        cnpjInput.addEventListener("blur", () => {
          const normalized = normalizeCNPJInput(cnpjInput.value);
          state.alternate.cnpj = normalized;
          cnpjInput.value = formatCNPJ(normalized);
          validateCNPJField(true);
          syncAlternativeProposalUI();
        });
      }

      if (form) {
        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const cpfOk = validateCPFField(true);
          if (!cpfOk) {
            cpfInput && cpfInput.focus();
            syncAlternativeProposalUI();
            return;
          }

          if (!state.alternate.hasCnpj) {
            syncAlternativeProposalUI();
            return;
          }

          if (state.alternate.hasCnpj === "Sim") {
            const cnpjOk = validateCNPJField(true);
            if (!cnpjOk) {
              cnpjInput && cnpjInput.focus();
              syncAlternativeProposalUI();
              return;
            }
          }

          pushDataLayerEvent("quiz_whatsapp_click", {
            destination: "disqualified_alternative",
            final_type: "disqualified_alternative"
          });

          await sendToAppsScript("quiz_finished", {
            final_type: "disqualified_alternative",
            cpf: state.alternate.cpf || "",
            cnpj: state.alternate.hasCnpj === "Sim" ? state.alternate.cnpj || "" : ""
          });

          openWhatsApp("disqualified");
        });

        syncAlternativeProposalUI();
      }
    }

    function attachClosedFlowEvents() {
      const btn = document.getElementById("btnCloseFlow");
      if (!btn) return;

      btn.addEventListener("click", async () => {
        pushDataLayerEvent("quiz_closed_flow", {
          final_type: "closed",
          origin_detected: state.origin || ""
        });

        await sendToAppsScript("quiz_finished", {
          final_type: "closed"

        exitSiteByOrigin();
      });
    }

    function syncAlternativeProposalUI() {
      if (state.currentStep !== "d2") return;

      const cpfDigits = state.alternate.cpf || "";
      const cpfCompleted = cpfDigits.length === 11;
      const cpfValid = cpfCompleted && isAcceptableCPF(cpfDigits);

      const hasCnpjBlock = document.getElementById("hasCnpjBlock");
      const cnpjFieldWrap = document.getElementById("cnpjFieldWrap");
      const finalCtaBox = document.getElementById("finalCtaBox");

      if (!cpfValid) {
        state.alternate.hasCnpj = "";
        state.alternate.cnpj = "";
      }

      if (hasCnpjBlock) {
        hasCnpjBlock.classList.toggle("hidden", !cpfValid);
      }

      document.querySelectorAll("[data-has-cnpj]").forEach((btn) => {
        const value = btn.getAttribute("data-has-cnpj");
        btn.classList.toggle("active", value === state.alternate.hasCnpj);
      });

      const shouldShowCnpj = cpfValid && state.alternate.hasCnpj === "Sim";
      if (cnpjFieldWrap) {
        cnpjFieldWrap.classList.toggle("hidden", !shouldShowCnpj);
      }

      const cnpjValue = state.alternate.cnpj || "";
      const cnpjCompleted = cnpjValue.length === 14;
      const canSubmit = cpfValid && (
        state.alternate.hasCnpj === "Não" ||
        (state.alternate.hasCnpj === "Sim" && cnpjCompleted && isAcceptableCNPJGeneral(cnpjValue))
      );

      if (finalCtaBox) {
        finalCtaBox.classList.toggle("hidden", !canSubmit);
      }

      if (!shouldShowCnpj) {
        const cnpjInput = document.getElementById("cnpj");
        if (cnpjInput && state.alternate.hasCnpj !== "Sim") {
          cnpjInput.value = "";
          cnpjInput.classList.remove("valid", "invalid");
        }
      }
    }

            </div>

            <div class="modal-actions">
              <button class="button pulse-invite" id="btnModalRecover">OK, VER PROPOSTAS</button>
              <button class="button button-outline" id="btnModalClose">FECHAR FORMULÁRIO</button>
            </div>
          </div>
        </div>
      `;

      const overlay = document.getElementById("modalOverlay");
      const btnRecover = document.getElementById("btnModalRecover");
      const btnClose = document.getElementById("btnModalClose");

      if (overlay) {
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) closeModal(true);
        });
      }

      if (btnRecover) {
        btnRecover.addEventListener("click", async () => {
          pushDataLayerEvent("quiz_recovery_modal_accept", {
            source_step: "d1"
          });

          await sendToAppsScript("quiz_recovery_modal_accept", {
            source_step: "d1"
          });

          closeModal(false);
          state.currentStep = "d2";
          render();
        });
      }

      if (btnClose) {
        btnClose.addEventListener("click", async () => {
          pushDataLayerEvent("quiz_closed_flow", {
            final_type: "disqualified_closed",
            origin_detected: state.origin || ""
          });

          await sendToAppsScript("quiz_finished", {
            final_type: "disqualified_closed"
          });

          closeModal(false);
          exitSiteByOrigin();
        });
      }

      document.addEventListener("keydown", handleEscapeModal);
    }

    function closeModal(allowClose = true) {
      if (!state.modalOpen && !modalRoot.innerHTML) return;
      if (!allowClose && state.modalOpen === false && !modalRoot.innerHTML) return;

      state.modalOpen = false;
      document.body.classList.remove("modal-open");
      modalRoot.innerHTML = "";
      document.removeEventListener("keydown", handleEscapeModal);
    }

    function handleEscapeModal(e) {
      if (e.key === "Escape") {
        closeModal(true);
      }
    }

    function buildWhatsAppIconHtml() {
      return `
        <img
          src="${escapeHtml(CONFIG.whatsappIconUrl)}"
          alt=""
          class="button-icon"
          onerror="this.style.display='none'"
        />
      `;
    }

    function openWhatsApp(type) {
      const message = buildWhatsAppMessage(type);
      const url = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(message)}`;
      window.location.href = url;
    }

    function buildWhatsAppMessage(type) {
      const firstName = getFirstName(state.lead.nome);
      const lines = [];

      lines.push(`Olá Denver, me chamo *${firstName}.*`);
      lines.push("");

      if (type === "disqualified") {
        lines.push("Respondi o formulário no site porém não me encaixo nos requisitos do PagBank, mas gostaria de saber mais sobre outras maquininhas.");
      } else {
        lines.push("Respondi o formulário no site e gostaria de mais informações sobre o PagBank.");
      }

      lines.push("");

      if (state.answers.p1) lines.push(`*Mot. Ctt:* ${state.answers.p1}`);
      if (state.answers.p2) lines.push(`*Canal excl.:* ${state.answers.p2}`);
      if (state.answers.p3) lines.push(`*Já teve Pag:* ${state.answers.p3}`);
      if (state.answers.p4) lines.push(`*Tem CPF/CNPJ apto:* ${state.answers.p4}`);
      if (state.answers.p5) lines.push(`*Fat.:* ${state.answers.p5}`);
      if (state.answers.p6) lines.push(`*Qnd pret. comp.:* ${state.answers.p6}`);
      if (state.answers.p7) lines.push(`*Valor disp.:* ${state.answers.p7}`);

      if (type === "disqualified") {
        lines.push("");

        if (state.alternate.cpf) {
          lines.push(`*CPF:* ${formatCPF(state.alternate.cpf)}`);
        }

        if (state.alternate.hasCnpj === "Sim" && state.alternate.cnpj) {
          lines.push(`*CNPJ:* ${formatCNPJ(state.alternate.cnpj)}`);
        } else {
          lines.push(`*CNPJ:* Não possui`);
        }
      }

      return lines.join("\n");
    }

    function validateNome(showError = false) {
      const input = document.getElementById("nome");
      if (!input) return false;

      const value = normalizeName(input.value.trim());
      const errorEl = document.getElementById("error-nome");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu primeiro nome.";
      } else if (value.length < 2) {
        valid = false;
        message = "Digite seu primeiro nome.";
      } else if (!/^[A-Za-zÀ-ÿ]+$/.test(value)) {
        valid = false;
        message = "Use apenas letras no nome.";
      } else if (!hasValidNameStructure(value)) {
        valid = false;
        message = "Digite um primeiro nome válido.";
      }

      updateInputState(input, valid, value.length > 0);
      setErrorState(errorEl, valid, message, showError);

      return valid;
    }

    function validateWhatsapp(showError = false) {
      const input = document.getElementById("whatsapp");
      if (!input) return false;

      const value = normalizeBrazilPhoneInput(input.value);
      const errorEl = document.getElementById("error-whatsapp");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu WhatsApp.";
      } else if (value.length !== 10 && value.length !== 11) {
        valid = false;
        message = "Digite um WhatsApp válido com DDD.";
      } else {
        const ddd = value.slice(0, 2);
        const numero = value.slice(2);

        if (!DDD_VALIDOS.has(ddd)) {
          valid = false;
          message = "Digite um DDD válido.";
        } else if (/^(\d)\1+$/.test(value)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        } else if (isStrictSequential(value)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        } else if (value.length === 11 && numero.charAt(0) !== "9") {
          valid = false;
          message = "Digite um celular válido com 9 após o DDD.";
        } else if (value.length === 10 && !/^[6-9]/.test(numero.charAt(0))) {
          valid = false;
          message = "Digite um WhatsApp válido com DDD.";
        } else if (isObviouslyFakePhone(value)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        }
      }

      updateInputState(input, valid, value.length > 0);
      setErrorState(errorEl, valid, message, showError);

      return valid;
    }

    function validateEmail(showError = false) {
      const input = document.getElementById("email");
      if (!input) return false;

      const value = normalizeEmail(input.value);
      input.value = value;

      const normalized = value.toLowerCase();
      const errorEl = document.getElementById("error-email");

      let valid = true;
      let message = "";

      const blockedEmails = new Set([
        "teste@teste.com",
        "asd@asd.com",
        "aaa@aaa.com",
        "test@test.com",
        "teste@gmail.com",
        "email@email.com"
      ]);

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i;

      if (!value) {
        valid = false;
        message = "Digite seu e-mail.";
      } else if (!emailRegex.test(value)) {
        valid = false;
        message = "Digite um e-mail válido.";
      } else if (blockedEmails.has(normalized)) {
        valid = false;
        message = "Digite um e-mail válido.";
      } else if (normalized.includes("..")) {
        valid = false;
        message = "Digite um e-mail válido.";
      } else {
        const [localPart = "", domainPart = ""] = normalized.split("@");
        if (!localPart || !domainPart || !domainPart.includes(".")) {
          valid = false;
          message = "Digite um e-mail válido.";
        } else if (/^(.)\1{4,}$/.test(localPart.replace(/[.\-_]/g, ""))) {
          valid = false;
          message = "Digite um e-mail válido.";
        }
      }

      updateInputState(input, valid, value.length > 0);
      setErrorState(errorEl, valid, message, showError);

      return valid;
    }

    function validateCPFField(showError = false) {
      const input = document.getElementById("cpf");
      if (!input) return false;

      const value = onlyDigits(input.value).slice(0, 11);
      state.alternate.cpf = value;
      const errorEl = document.getElementById("error-cpf");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu CPF.";
      } else if (value.length < 11) {
        valid = false;
        message = "Digite seu CPF completo.";
      } else if (!isAcceptableCPF(value)) {
        valid = false;
        message = "Digite um CPF válido.";
      }

      const shouldMark = value.length === 11 || showError;
      updateInputStateSoft(input, valid, value.length > 0, shouldMark);

      const shouldShow = showError || value.length === 11;
      setErrorState(errorEl, valid, message, shouldShow);

      return valid;
    }

    function validateCNPJField(showError = false) {
      const input = document.getElementById("cnpj");
      if (!input) return false;

      const value = normalizeCNPJInput(input.value).slice(0, 14);
      state.alternate.cnpj = value;
      const errorEl = document.getElementById("error-cnpj");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu CNPJ.";
      } else if (value.length < 14) {
        valid = false;
        message = "Digite seu CNPJ completo.";
      } else if (!isAcceptableCNPJGeneral(value)) {
        valid = false;
        message = "Digite um CNPJ válido.";
      }

      const shouldMark = value.length === 14 || showError;
      updateInputStateSoft(input, valid, value.length > 0, shouldMark);

      const shouldShow = showError || value.length === 14;
      setErrorState(errorEl, valid, message, shouldShow);

      return valid;
    }

    function setErrorState(errorEl, valid, message, showError) {
      if (!errorEl) return;

      if (!showError) {
        errorEl.textContent = "";
        errorEl.classList.remove("show");
        return;
      }

      if (valid) {
        errorEl.textContent = "";
        errorEl.classList.remove("show");
      } else {
        errorEl.textContent = message;
        errorEl.classList.add("show");
      }
    }

    function updateInputState(input, valid, hasValue) {
      if (!input) return;
      input.classList.remove("valid", "invalid");

      if (!hasValue) return;

      if (valid) {
        input.classList.add("valid");
      } else {
        input.classList.add("invalid");
      }
    }

    function updateInputStateSoft(input, valid, hasValue, shouldMark) {
      if (!input) return;
      input.classList.remove("valid", "invalid");

      if (!hasValue || !shouldMark) return;

      if (valid) {
        input.classList.add("valid");
      } else {
        input.classList.add("invalid");
      }
    }

    function normalizeBrazilPhoneInput(value) {
      let digits = onlyDigits(value);

      if (digits.startsWith("00")) digits = digits.slice(2);
      if (digits.length >= 12 && digits.startsWith("55")) digits = digits.slice(2);
      if (digits.length > 11) digits = digits.slice(0, 11);

      return digits;
    }

    function handlePhoneInputMask(e) {
      let digits = normalizeBrazilPhoneInput(e.target.value);
      if (digits.length > 11) digits = digits.slice(0, 11);
      e.target.value = formatPhone(digits);
    }

    function handleNameInputFormat(e) {
      const raw = String(e.target.value || "");
      const digitsRemoved = raw.replace(/\d/g, "");
      const noExtraSpaces = digitsRemoved.replace(/\s+/g, " ");
      const onlyFirstWord = noExtraSpaces.trim().split(" ")[0] || "";
      const onlyLetters = onlyFirstWord.replace(/[^A-Za-zÀ-ÿ]/g, "");
      e.target.value = capitalizeWord(onlyLetters);
    }

    function normalizeName(value) {
      const firstWord = String(value || "")
        .replace(/\d/g, "")
        .replace(/[^A-Za-zÀ-ÿ\s]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .filter(Boolean)[0] || "";

      return capitalizeWord(firstWord);
    }

    function normalizeEmail(value) {
      return String(value || "")
        .replace(/\s+/g, "")
        .toLowerCase()
        .trim();
    }

    function normalizeCNPJInput(value) {
      return String(value || "")
        .toUpperCase()
        .replace(/[^A-Z0-9]/g, "")
        .slice(0, 14);
    }

    function capitalizeWord(word) {
      const clean = String(word || "").toLowerCase();
      return clean.charAt(0).toUpperCase() + clean.slice(1);
    }

    function getFirstName(value) {
      const normalized = normalizeName(value);
      return normalized || "por aqui";
    }

    function hasValidNameStructure(name) {
      const clean = String(name || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();

      const blockedExact = new Set([
        "teste", "teste1", "admin", "nome", "usuario", "user",
        "asdf", "asdfg", "qwer", "qwert", "qwerty",
        "zxcv", "zxcvb", "zxcvbn", "abc", "abcd",
        "kkk", "kkkk", "aaaa", "bbbb", "cccc", "xxxxx", "xxx",
        "nao", "nada", "fake", "fulano", "ciclano"
      ]);

      const blockedContains = ["asdf", "qwer", "zxcv", "teste", "admin", "qaz", "wsx", "edc"];

      if (blockedExact.has(clean)) return false;
      if (blockedContains.some((pattern) => clean.includes(pattern))) return false;
      if (!/[aeiouáéíóúâêôãõ]/i.test(name)) return false;
      if (/([a-zà-ÿ])\1{3,}/i.test(name)) return false;
      if (new Set(clean.split("")).size <= 2) return false;
      if (clean.length >= 6 && /^[bcdfghjklmnpqrstvwxyz]+$/i.test(clean)) return false;

      return true;
    }

    function isAcceptableCPF(cpf) {
      const clean = onlyDigits(cpf);

      if (!clean || clean.length !== 11) return false;
      if (/^(\d)\1{10}$/.test(clean)) return false;

      return true;
    }

    function isAcceptableCNPJGeneral(cnpj) {
      const clean = normalizeCNPJInput(cnpj);

      if (!clean || clean.length !== 14) return false;
      if (/^([A-Z0-9])\1{13}$/.test(clean)) return false;

      return true;
    }

    function formatPhone(value) {
      const digits = onlyDigits(value);

      if (!digits) return "";
      if (digits.length <= 2) return `(${digits}`;
      if (digits.length <= 6) return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
      if (digits.length === 10) {
        return `(${digits.slice(0, 2)}) ${digits.slice(2, 6)}-${digits.slice(6, 10)}`;
      }
      return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7, 11)}`;
    }

    function formatCPF(value) {
      const digits = onlyDigits(value).slice(0, 11);

      if (digits.length <= 3) return digits;
      if (digits.length <= 6) return `${digits.slice(0, 3)}.${digits.slice(3)}`;
      if (digits.length <= 9) return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6)}`;
      return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6, 9)}-${digits.slice(9, 11)}`;
    }

    function formatCNPJ(value) {
      const clean = normalizeCNPJInput(value);

      if (clean.length <= 2) return clean;
      if (clean.length <= 5) return `${clean.slice(0, 2)}.${clean.slice(2)}`;
      if (clean.length <= 8) return `${clean.slice(0, 2)}.${clean.slice(2, 5)}.${clean.slice(5)}`;
      if (clean.length <= 12) return `${clean.slice(0, 2)}.${clean.slice(2, 5)}.${clean.slice(5, 8)}/${clean.slice(8)}`;
      return `${clean.slice(0, 2)}.${clean.slice(2, 5)}.${clean.slice(5, 8)}/${clean.slice(8, 12)}-${clean.slice(12, 14)}`;
    }

    function onlyDigits(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function isStrictSequential(value) {
      const asc = "01234567890";
      const desc = "09876543210";

      for (let i = 0; i <= asc.length - value.length; i++) {
        if (asc.slice(i, i + value.length) === value) return true;
      }

      for (let i = 0; i <= desc.length - value.length; i++) {
        if (desc.slice(i, i + value.length) === value) return true;
      }

      return false;
    }

    function isObviouslyFakePhone(value) {
      const numero = value.slice(2);

      if (/^(12345678|123456789|98765432|987654321)$/.test(numero)) return true;
      if (/^(00000000|11111111|22222222|33333333|44444444|55555555|66666666|77777777|88888888|99999999)$/.test(numero)) return true;
      if (/^(000000000|111111111|222222222|333333333|444444444|555555555|666666666|777777777|888888888|999999999)$/.test(numero)) return true;

      return false;
    }

    function captureUTMs() {
      const params = new URLSearchParams(window.location.search);

      state.utms = {
        utm_source: params.get("utm_source") || "",
        utm_medium: params.get("utm_medium") || "",
        utm_campaign: params.get("utm_campaign") || "",
        utm_content: params.get("utm_content") || "",
        utm_term: params.get("utm_term") || "",
        fbclid: params.get("fbclid") || "",
        gclid: params.get("gclid") || "",
        ttclid: params.get("ttclid") || ""
      };
    }

    function detectOrigin() {
      const ref = (document.referrer || "").toLowerCase();
      state.origin = ref;
      sessionStorage.setItem("quiz_referrer", ref);
    }

    function exitSiteByOrigin() {
      const ref = sessionStorage.getItem("quiz_referrer") || state.origin || "";

      if (window.history.length > 1) {
        history.back();
        setTimeout(() => {
          fallbackExit(ref);
        }, 900);
        return;
      }

      fallbackExit(ref);
    }

    function fallbackExit(ref) {
      const origin = String(ref || "").toLowerCase();
      const utmSource = String(state.utms.utm_source || "").toLowerCase();

      if (origin.includes("instagram") || utmSource.includes("instagram")) {
        window.location.href = "https://www.instagram.com/";
        return;
      }

      if (origin.includes("facebook") || origin.includes("fb") || utmSource.includes("facebook")) {
        window.location.href = "https://www.facebook.com/";
        return;
      }

      if (origin.includes("tiktok") || utmSource.includes("tiktok")) {
        window.location.href = "https://www.tiktok.com/";
        return;
      }

      if (origin.includes("google") || utmSource.includes("google")) {
        window.location.href = "https://www.google.com/";
        return;
      }

      window.location.href = "about:blank";
    }

    function pushDataLayerEvent(eventName, extra = {}) {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: eventName,
        nome: state.lead.nome || "",
        whatsapp: state.lead.whatsapp || "",
        email: state.lead.email || "",
        p1: state.answers.p1 || "",
        p2: state.answers.p2 || "",
        p3: state.answers.p3 || "",
        p4: state.answers.p4 || "",
        p5: state.answers.p5 || "",
        p6: state.answers.p6 || "",
        p7: state.answers.p7 || "",
        cpf: state.alternate.cpf || "",
        has_cnpj: state.alternate.hasCnpj || "",
        cnpj: state.alternate.cnpj || "",
        ...state.utms,
        ...extra
      });
    }

    async function sendToAppsScript(eventType, extra = {}) {
      if (!CONFIG.appsScriptUrl) return;

      const payload = {
        event_type: eventType,
        timestamp: new Date().toISOString(),
        nome: state.lead.nome || "",
        whatsapp: state.lead.whatsapp || "",
        email: state.lead.email || "",
        p1: state.answers.p1 || "",
        p2: state.answers.p2 || "",
        p3: state.answers.p3 || "",
        p4: state.answers.p4 || "",
        p5: state.answers.p5 || "",
        p6: state.answers.p6 || "",
        p7: state.answers.p7 || "",
        cpf: state.alternate.cpf || "",
        has_cnpj: state.alternate.hasCnpj || "",
        cnpj: state.alternate.cnpj || "",
        final_type: state.finalType || "",
        page_url: window.location.href,
        user_agent: navigator.userAgent,
        referrer: state.origin || "",
        ...state.utms,
        ...extra
      };

      try {
        await fetch(CONFIG.appsScriptUrl, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        console.error("Apps Script send failed:", error);
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    captureUTMs();
    detectOrigin();
    pushDataLayerEvent("quiz_start");
    render();
  </script>
</body>
