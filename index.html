<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário / Quiz - Denver Maquininhas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #d6d6d6;
      --border: #373737;
      --border-hover: #4a4a4a;
      --input-bg: #efefef;
      --input-text: #111111;
      --yellow: #f6d300;
      --yellow-soft: rgba(246, 211, 0, 0.16);
      --yellow-soft-2: rgba(246, 211, 0, 0.08);
      --red: #d63b3b;
      --red-dark: #8b1f1f;
      --red-soft: rgba(214, 59, 59, 0.14);
      --error: #ff6b6b;
      --success-soft: rgba(246, 211, 0, 0.08);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      padding: 28px 20px 40px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    h1, h2 {
      margin: 0 0 12px;
      line-height: 1.14;
      font-weight: 800;
    }

    h1 { font-size: 34px; }
    h2 { font-size: 30px; }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 26px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .required {
      color: #ff3b30;
    }

    input {
      width: 100%;
      border: 2px solid #8d8d8d;
      border-radius: 18px;
      background: var(--input-bg);
      color: var(--input-text);
      padding: 20px 18px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #007aff;
      background: #ffffff;
    }

    .error {
      display: none;
      color: var(--error);
      font-size: 14px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .error.show {
      display: block;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: var(--yellow);
      color: #0b0b0b;
      font-weight: 800;
      font-size: 20px;
      padding: 20px 16px;
      cursor: pointer;
      margin-top: 12px;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
    }

    .button:hover {
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .button:active {
      transform: scale(0.985);
    }

    .button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      box-shadow: none;
    }

    .button-secondary {
      background: #181818;
      color: #ffffff;
      border: 1px solid #303030;
    }

    .button-danger {
      background: var(--red-dark);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 0 0 1px rgba(214, 59, 59, 0.08);
    }

    .button-danger:hover {
      box-shadow: 0 0 0 4px rgba(214, 59, 59, 0.12);
    }

    .button-attention {
      animation: ctaPulse 1.7s ease-in-out infinite;
      box-shadow:
        0 0 0 0 rgba(246, 211, 0, 0.22),
        0 0 18px rgba(246, 211, 0, 0.16);
    }

    .button-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
      flex: 0 0 24px;
    }

    .question-title {
      font-size: 30px;
      line-height: 1.2;
      margin-bottom: 12px;
      font-weight: 800;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid var(--border);
      background: #0d0d0d;
      color: #ffffff;
      border-radius: 18px;
      padding: 18px 16px;
      font-size: 18px;
      text-align: left;
      cursor: pointer;
      line-height: 1.45;
      display: flex;
      align-items: center;
      gap: 14px;
      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        transform 0.16s ease;
      animation: neutralBreathLoop 2.1s ease-in-out infinite;
    }

    .answer-btn:hover,
    .answer-btn:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.04);
      outline: none;
      transform: translateY(-1px);
    }

    .answer-btn:active {
      transform: scale(0.992);
    }

    .answer-radio {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      flex: 0 0 22px;
      position: relative;
      transition:
        border-color 0.22s ease,
        background 0.22s ease,
        box-shadow 0.22s ease;
      background: transparent;
    }

    .answer-btn.selected {
      border-color: var(--yellow);
      background: var(--yellow-soft-2);
      box-shadow:
        0 0 0 4px var(--yellow-soft),
        0 0 18px rgba(246, 211, 0, 0.12);
      animation: selectedGlow 0.9s ease-in-out 1;
    }

    .answer-btn.selected .answer-radio {
      border-color: var(--yellow);
      background: var(--yellow);
      box-shadow: 0 0 0 5px rgba(246, 211, 0, 0.16);
    }

    .answer-btn.selected .answer-radio::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #111111;
    }

    .answer-btn.confirming {
      animation: confirmPulse 0.5s ease 2;
    }

    .answer-text {
      flex: 1;
    }

    .result-box {
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      border-radius: 18px;
      padding: 20px;
      margin-top: 10px;
    }

    .small-note {
      color: #d2d2d2;
      font-size: 16px;
      line-height: 1.6;
    }

    .warning-highlight {
      margin-top: 16px;
      border: 1px solid rgba(246, 211, 0, 0.35);
      background: rgba(246, 211, 0, 0.08);
      border-radius: 16px;
      padding: 14px 14px 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      box-shadow: 0 0 0 1px rgba(246, 211, 0, 0.08);
      animation: attentionPulse 1.7s ease-in-out infinite;
    }

    .warning-icon {
      font-size: 20px;
      line-height: 1;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .warning-text {
      color: #fff4a8;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 6px;
    }

    .compact-box {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 18px;
      margin-top: 8px;
    }

    .compact-text {
      color: #e8e8e8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .lgpd-note {
      margin-top: 10px;
      color: #d9d9d9;
      font-size: 13px;
      line-height: 1.55;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px 13px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
      margin-bottom: 8px;
    }

    .radio-card {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px solid #333333;
      border-radius: 16px;
      padding: 16px 14px;
      background: #0d0d0d;
      cursor: pointer;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease, transform .16s ease;
    }

    .radio-card:hover {
      border-color: #4b4b4b;
      transform: translateY(-1px);
    }

    .radio-card.selected {
      border-color: var(--yellow);
      background: var(--success-soft);
      box-shadow: 0 0 0 4px var(--yellow-soft);
    }

    .radio-card input {
      display: none;
    }

    .radio-indicator {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      flex: 0 0 22px;
      position: relative;
    }

    .radio-card.selected .radio-indicator {
      border-color: var(--yellow);
      background: var(--yellow);
    }

    .radio-card.selected .radio-indicator::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #111111;
    }

    .radio-text {
      font-size: 18px;
      line-height: 1.4;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: 100%;
      max-width: 520px;
      background: #111111;
      border: 1px solid #2f2f2f;
      border-radius: 22px;
      padding: 22px 18px 16px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.42);
      transform: translateY(8px);
      transition: transform 0.2s ease;
    }

    .modal-overlay.show .modal-card {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 28px;
      line-height: 1.18;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .modal-text {
      color: #e8e8e8;
      font-size: 16px;
      line-height: 1.65;
      margin-bottom: 6px;
    }

    @keyframes neutralBreathLoop {
      0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
      50% { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03); }
      100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
    }

    @keyframes confirmPulse {
      0% { transform: scale(1); }
      25% { transform: scale(1.012); }
      50% { transform: scale(0.998); }
      75% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }

    @keyframes selectedGlow {
      0% { box-shadow: 0 0 0 0 rgba(246, 211, 0, 0); }
      50% {
        box-shadow:
          0 0 0 5px rgba(246, 211, 0, 0.18),
          0 0 24px rgba(246, 211, 0, 0.14);
      }
      100% {
        box-shadow:
          0 0 0 4px rgba(246, 211, 0, 0.16),
          0 0 18px rgba(246, 211, 0, 0.12);
      }
    }

    @keyframes attentionPulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(246, 211, 0, 0.00);
      }
      50% {
        transform: scale(1.008);
        box-shadow: 0 0 0 5px rgba(246, 211, 0, 0.08);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(246, 211, 0, 0.00);
      }
    }

    @keyframes ctaPulse {
      0% {
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(246, 211, 0, 0.22),
          0 0 16px rgba(246, 211, 0, 0.10);
      }
      50% {
        transform: scale(1.012);
        box-shadow:
          0 0 0 8px rgba(246, 211, 0, 0.00),
          0 0 24px rgba(246, 211, 0, 0.18);
      }
      100% {
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(246, 211, 0, 0.00),
          0 0 16px rgba(246, 211, 0, 0.10);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"></div>
  </div>

  <div id="exitModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="exitModalTitle">
      <div class="modal-title" id="exitModalTitle">Tem certeza que deseja sair?</div>
      <div class="modal-text">
        Ainda conseguimos pra você <strong>uma proposta personalizada</strong>, com <strong>taxas baixinhas</strong>, seja no <strong>CPF ou CNPJ</strong>, com opções <strong>sem aluguel ou mensalidade</strong>, <strong>frete expresso grátis para o seu endereço</strong> e você investindo <strong>menos de R$ 100,00</strong>! 🤩
      </div>

      <div class="button-stack">
        <button class="button button-attention" id="btnRecoverExit">OK, VER PROPOSTAS</button>
        <button class="button button-danger" id="btnConfirmExit">FECHAR FORMULÁRIO</button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      whatsappNumber: "5531991741433",
      whatsappIconUrl: "https://denvermaquininhas.com.br/wp-content/uploads/2026/03/ICON-WPP.png",
      appsScriptUrl: "",
      titleLeadForm: "Antes de continuar, me diga como posso falar com você 👇",
      subtitleLeadForm: "Leva menos de 10 segundos."
    };

    const state = {
      lead: {
        nome: "",
        whatsapp: "",
        email: "",
        cpf: "",
        possuiCnpj: "",
        cnpj: ""
      },
      answers: {
        p1: "",
        p2: "",
        p3: "",
        p4: "",
        p5: "",
        p6: "",
        p7: ""
      },
      currentStep: "lead",
      finalType: "",
      utms: {},
      origin: ""
    };

    const DDD_VALIDOS = new Set([
      "11","12","13","14","15","16","17","18","19",
      "21","22","24",
      "27","28",
      "31","32","33","34","35","37","38",
      "41","42","43","44","45","46",
      "47","48","49",
      "51","53","54","55",
      "61",
      "62","63","64","65","66","67","68","69",
      "71","73","74","75","77","79",
      "81","82","83","84","85","86","87","88","89",
      "91","92","93","94","95","96","97","98","99"
    ]);

    const QUIZ = {
      p1: {
        title: "Qual é o seu motivo de contato hoje com um Consultor do PagBank?",
        options: [
          { label: "🤑 Comprar maquininha PagBank", short: "Comprar Pag", whatsappLabel: "Comprar Pag", next: "p3" },
          { label: "🛠 Preciso de suporte (taxas, entrega, uso)", short: "Suporte", whatsappLabel: "Suporte", next: "p2" },
          { label: "💳 Crédito ou cartão (empréstimo, limite)", short: "Crédito/cartão", whatsappLabel: "Crédito/cartão", next: "p2" }
        ]
      },

      p2: {
        title: "Este canal é exclusivo para vendas de maquininhas do PagBank, para outros assuntos, fale com a Central pelo telefone 0800-728-2174 (opção 7, depois opção 2).",
        options: [
          { label: "✅ Entendi, finalizar perguntas.", short: "Entendi", whatsappLabel: "Entendi", next: "e3" },
          { label: "🛍️ Ótimo, comprar maquininha", short: "Comprar maquininha", whatsappLabel: "Comprar maquininha", next: "p3" }
        ]
      },

      p3: {
        title: "Você já teve uma maquininha PagBank no seu CPF ou CNPJ?",
        options: [
          { label: "❌ Nunca.", short: "Nunca", whatsappLabel: "Nunca", next: "p5" },
          { label: "⏸ Já tive/tenho, porém não uso há mais de 6 meses.", short: "Sem uso +6m", whatsappLabel: "Sem uso +6m", next: "p5" },
          { label: "✅ Tenho e uso atualmente.", short: "Tenho e uso", whatsappLabel: "Tenho e uso", next: "p4" }
        ]
      },

      p4: {
        title: "Você tem algum CPF ou CNPJ que nunca teve maquininha PagBank ou está sem uso há mais de 6 meses para aproveitar essa oferta?",
        options: [
          { label: "✅ Sim", short: "Sim", whatsappLabel: "Sim", next: "p5" },
          { label: "❌ Não", short: "Não", whatsappLabel: "Não", next: "e2" }
        ]
      },

      p5: {
        title: "Qual é o seu faturamento médio mensal atualmente?",
        options: [
          { label: "💰 Acima de R$ 2.000", short: "+ de 2k", whatsappLabel: "+ de 2k", next: "p6" },
          { label: "💰 Acima de R$ 5.000", short: "+ de 5k", whatsappLabel: "+ de 5k", next: "p6" },
          { label: "💰 Acima de R$ 10.000", short: "+ de 10k", whatsappLabel: "+ de 10k", next: "p6" },
          { label: "💰 Acima de R$ 20.000", short: "+ de 20k", whatsappLabel: "+ de 20k", next: "p6" },
          { label: "💰 Acima de R$ 40.000", short: "+ de 40k", whatsappLabel: "+ de 40k", next: "p6" },
          { label: "💰 Acima de R$ 80.000", short: "+ de 80k", whatsappLabel: "+ de 80k", next: "p6" },
          { label: "⬇️ Até R$ 2.000", short: "Até 2k", whatsappLabel: "Até 2k", next: "p6" }
        ]
      },

      p6: {
        title: "Quando você pretende comprar a maquininha do PagBank?",
        options: [
          { label: "🚀 Preciso para esta semana.", short: "Esta semana", whatsappLabel: "Esta semana", next: "p7" },
          { label: "📅 Preciso para este mês.", short: "Este mês", whatsappLabel: "Este mês", next: "p7" },
          { label: "🔎 Estou pesquisando preços e taxas.", short: "Pesquisando", whatsappLabel: "Pesquisando", next: "p7" }
        ]
      },

      p7: {
        title: "Qual valor você tem disponível hoje para investir em uma maquininha do PagBank?",
        options: [
          { label: "🤑 R$ 59 ou mais", short: "R$ 59+", whatsappLabel: "R$ 59+", next: "e1" },
          { label: "🤑 R$ 109 ou mais", short: "R$ 109+", whatsappLabel: "R$ 109+", next: "e1" },
          { label: "🤑 R$ 199 ou mais", short: "R$ 199+", whatsappLabel: "R$ 199+", next: "e1" },
          { label: "⬇️ Até R$ 59", short: "Até R$ 59", whatsappLabel: "Até R$ 59", next: "e2" }
        ]
      }
    };

    const app = document.getElementById("app");
    const exitModal = document.getElementById("exitModal");
    const btnRecoverExit = document.getElementById("btnRecoverExit");
    const btnConfirmExit = document.getElementById("btnConfirmExit");

    btnRecoverExit.addEventListener("click", () => {
      closeExitModal();
      state.currentStep = "e2data";
      render();
    });

    btnConfirmExit.addEventListener("click", async () => {
      closeExitModal();

      pushDataLayerEvent("quiz_closed_flow", {
        final_type: "disqualified_closed",
        origin_detected: state.origin || ""
      });

      await sendToAppsScript("quiz_finished", {
        final_type: "disqualified_closed"
      });

      exitSiteByOrigin();
    });

    exitModal.addEventListener("click", (e) => {
      if (e.target === exitModal) closeExitModal();
    });

    function openExitModal() {
      exitModal.classList.add("show");
      exitModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeExitModal() {
      exitModal.classList.remove("show");
      exitModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function render() {
      window.scrollTo({ top: 0, behavior: "smooth" });

      if (state.currentStep === "lead") {
        renderLeadForm();
        return;
      }

      if (QUIZ[state.currentStep]) {
        renderQuestion(state.currentStep);
        return;
      }

      if (state.currentStep === "e1") {
        renderResultQualified();
        return;
      }

      if (state.currentStep === "e2") {
        renderResultDisqualified();
        return;
      }

      if (state.currentStep === "e2data") {
        renderDisqualifiedDataStep();
        return;
      }

      if (state.currentStep === "e3") {
        renderResultCloseFlow();
      }
    }

    function renderLeadForm() {
      app.innerHTML = `
        <div>
          <h1>${CONFIG.titleLeadForm}</h1>
          <div class="subtitle">${CONFIG.subtitleLeadForm}</div>

          <form id="formQuizDenver" novalidate>
            <div class="field">
              <label for="nome">Primeiro nome <span class="required">*</span></label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Digite apenas o seu primeiro nome"
                autocomplete="given-name"
                value="${escapeHtml(state.lead.nome)}"
              />
              <div class="error" id="error-nome"></div>
            </div>

            <div class="field">
              <label for="whatsapp">WhatsApp <span class="required">*</span></label>
              <input
                type="tel"
                id="whatsapp"
                name="whatsapp"
                placeholder="(DDD) 9 0000-0000"
                inputmode="numeric"
                autocomplete="tel"
                value="${escapeHtml(formatPhone(state.lead.whatsapp))}"
              />
              <div class="error" id="error-whatsapp"></div>
            </div>

            <div class="field">
              <label for="email">E-mail <span class="required">*</span></label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seuemail@gmail.com"
                autocomplete="email"
                value="${escapeHtml(state.lead.email)}"
              />
              <div class="error" id="error-email"></div>
            </div>

            <button type="submit" class="button" id="btnNextLead">PRÓXIMO</button>
          </form>
        </div>
      `;

      const form = document.getElementById("formQuizDenver");
      const nomeInput = document.getElementById("nome");
      const whatsappInput = document.getElementById("whatsapp");
      const emailInput = document.getElementById("email");
      const btnNextLead = document.getElementById("btnNextLead");

      nomeInput.addEventListener("input", handleNameInputFormat);
      whatsappInput.addEventListener("input", handlePhoneInputMask);

      nomeInput.addEventListener("blur", () => validateNome(true));
      whatsappInput.addEventListener("blur", () => {
        const digits = normalizeBrazilPhoneInput(whatsappInput.value);
        whatsappInput.value = formatPhone(digits);
        validateWhatsapp(true);
      });
      emailInput.addEventListener("blur", () => validateEmail(true));

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        state.lead.nome = normalizeName(nomeInput.value.trim());
        state.lead.whatsapp = normalizeBrazilPhoneInput(whatsappInput.value);
        state.lead.email = emailInput.value.trim();

        nomeInput.value = state.lead.nome;
        whatsappInput.value = formatPhone(state.lead.whatsapp);

        const nomeOk = validateNome(true);
        const whatsappOk = validateWhatsapp(true);

    function validateNome(showError = false) {
      const input = document.getElementById("nome");
      const value = normalizeName(input.value.trim());
      const errorEl = document.getElementById("error-nome");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu primeiro nome.";
      } else if (value.length < 2) {
        valid = false;
        message = "Digite seu primeiro nome.";
      } else if (!/^[A-Za-zÀ-ÿ]+$/.test(value)) {
        valid = false;
        message = "Use apenas letras no nome.";
      } else if (!hasValidNameStructure(value)) {
        valid = false;
        message = "Digite um primeiro nome válido.";
      }

      setErrorState(errorEl, valid, message, showError);
      return valid;
    }

    function validateWhatsapp(showError = false) {
      const value = normalizeBrazilPhoneInput(document.getElementById("whatsapp").value);
      const errorEl = document.getElementById("error-whatsapp");

      let valid = true;
      let message = "";

      if (!value) {
        valid = false;
        message = "Digite seu WhatsApp.";
      } else if (value.length !== 10 && value.length !== 11) {
        valid = false;
        message = "Digite um WhatsApp válido com DDD.";
      } else {
        const ddd = value.slice(0, 2);
        const numero = value.slice(2);

        if (!DDD_VALIDOS.has(ddd)) {
          valid = false;
          message = "Digite um DDD válido.";
        } else if (/^(\d)\1+$/.test(value)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        } else if (isStrictSequential(value)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        } else if (value.length === 11 && numero.charAt(0) !== "9") {
          valid = false;
          message = "Digite um celular válido com 9 após o DDD.";
        } else if (value.length === 10 && !/^[6-9]/.test(numero.charAt(0))) {
          valid = false;
          message = "Digite um WhatsApp válido com DDD.";
        } else if (isObviouslyFakePhone(value)) {
          valid = false;
          message = "Digite um WhatsApp válido.";
        }
      }

      setErrorState(errorEl, valid, message, showError);
      return valid;
    }

    function normalizeBrazilPhoneInput(value) {
      let digits = onlyDigits(value);

      if (digits.startsWith("00")) {
        digits = digits.slice(2);
      }

      if (digits.length >= 12 && digits.startsWith("55")) {
        digits = digits.slice(2);
      }

      return digits;
    }

    function handlePhoneInputMask(e) {
      let digits = normalizeBrazilPhoneInput(e.target.value);
      if (digits.length > 11) digits = digits.slice(0, 11);
      e.target.value = formatPhone(digits);
    }

    function handleNameInputFormat(e) {
      const raw = String(e.target.value || "");
      const digitsRemoved = raw.replace(/\d/g, "");
      const noExtraSpaces = digitsRemoved.replace(/\s+/g, " ");
      const onlyFirstWord = noExtraSpaces.trim().split(" ")[0] || "";
      const onlyLetters = onlyFirstWord.replace(/[^A-Za-zÀ-ÿ]/g, "");
      e.target.value = capitalizeWord(onlyLetters);
    }

    function normalizeName(value) {
      const firstWord = String(value || "")
        .replace(/\d/g, "")
        .replace(/[^A-Za-zÀ-ÿ\s]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .filter(Boolean)[0] || "";

      return capitalizeWord(firstWord);
    }

    function capitalizeWord(word) {
      const clean = String(word || "").toLowerCase();
      return clean.charAt(0).toUpperCase() + clean.slice(1);
    }

    function getFirstName(value) {
      const normalized = normalizeName(value);
      return normalized || "por aqui";
    }

    function hasValidNameStructure(name) {
      const clean = String(name || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();

      const blockedExact = new Set([
        "teste", "teste1", "admin", "nome", "usuario", "user",
        "asdf", "asdfg", "qwer", "qwert", "qwerty",
        "zxcv", "zxcvb", "zxcvbn", "abc", "abcd",
        "kkk", "kkkk", "aaaa", "bbbb", "cccc", "xxxxx", "xxx",
        "nao", "nada", "fake", "fulano", "ciclano"
      ]);

      const blockedContains = ["asdf", "qwer", "zxcv", "teste", "admin", "qaz", "wsx", "edc"];

      if (blockedExact.has(clean)) return false;
      if (blockedContains.some(pattern => clean.includes(pattern))) return false;
      if (!/[aeiouáéíóúâêôãõ]/i.test(name)) return false;
      if (/([a-zà-ÿ])\1{3,}/i.test(name)) return false;
      if (new Set(clean.split("")).size <= 2) return false;
      if (clean.length >= 6 && /^[bcdfghjklmnpqrstvwxyz]+$/i.test(clean)) return false;

      return true;
    }

    function formatPhone(value) {
      const digits = onlyDigits(value);

      if (!digits) return "";
      if (digits.length <= 2) return `(${digits}`;
      if (digits.length <= 6) return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
      if (digits.length === 10) {
        return `(${digits.slice(0, 2)}) ${digits.slice(2, 6)}-${digits.slice(6, 10)}`;
      }
      return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7, 11)}`;
    }

    function formatCPF(value) {
      const digits = onlyDigits(value).slice(0, 11);
      if (!digits) return "";
      if (digits.length <= 3) return digits;
      if (digits.length <= 6) return `${digits.slice(0, 3)}.${digits.slice(3)}`;
      if (digits.length <= 9) return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6)}`;
      return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6, 9)}-${digits.slice(9, 11)}`;
    }

    function formatCNPJ(value) {
      const digits = onlyDigits(value).slice(0, 14);
      if (!digits) return "";
      if (digits.length <= 2) return digits;
      if (digits.length <= 5) return `${digits.slice(0, 2)}.${digits.slice(2)}`;
      if (digits.length <= 8) return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5)}`;
      if (digits.length <= 12) return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5, 8)}/${digits.slice(8)}`;
      return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5, 8)}/${digits.slice(8, 12)}-${digits.slice(12, 14)}`;
    }

    function isValidCPF(value) {
      const cpf = onlyDigits(value);

      if (cpf.length !== 11) return false;
      if (/^(\d)\1{10}$/.test(cpf)) return false;
