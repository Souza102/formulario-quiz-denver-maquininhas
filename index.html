<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário / Quiz - Denver Maquininhas</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #000000;
      --card: #0b0b0b;
      --card-2: #111111;
      --text: #ffffff;
      --muted: #d4d4d4;
      --muted-2: #a8a8a8;
      --border: #303030;
      --border-hover: #4b4b4b;
      --input-bg: #f0f0f0;
      --input-text: #111111;
      --yellow: #f6d300;
      --yellow-2: #ffe55c;
      --yellow-soft: rgba(246, 211, 0, 0.18);
      --yellow-soft-2: rgba(246, 211, 0, 0.08);
      --green-soft: rgba(44, 186, 93, 0.12);
      --red: #ff3b30;
      --blue-focus: #3b82f6;
      --shadow-soft: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #101010 0%, #000000 48%, #000000 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 28px 18px 50px;
      overflow-x: hidden;
    }

    body.modal-open,
    body.privacy-open {
      overflow: hidden;
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
      position: relative;
    }

    .app-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 26px;
      padding: 24px 18px 22px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(6px);
      position: relative;
      overflow: hidden;
    }

    .app-shell::before {
      content: "";
      position: absolute;
      inset: -80px auto auto -80px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(246,211,0,0.14) 0%, rgba(246,211,0,0) 72%);
      pointer-events: none;
    }

    .app-shell::after {
      content: "";
      position: absolute;
      inset: auto -100px -100px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(246,211,0,0.08) 0%, rgba(246,211,0,0) 70%);
      pointer-events: none;
    }

    .progress-wrap { margin-bottom: 20px; }
    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--yellow), #ffe96d);
      box-shadow: 0 0 18px rgba(246, 211, 0, 0.4);
      transition: width 0.42s ease;
    }

    h1, h2, h3 {
      margin: 0 0 12px;
      line-height: 1.14;
      font-weight: 800;
    }

    h1 { font-size: 32px; }
    h2 { font-size: 28px; }
    h3 { font-size: 22px; }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 18px;
      position: relative;
    }

    .field-tight { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.25;
    }

    .required { color: var(--red); }

    input {
      width: 100%;
      border: 2px solid #8c8c8c;
      border-radius: 18px;
      background: var(--input-bg);
      color: var(--input-text);
      padding: 18px 16px;
      font-size: 18px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, transform 0.12s ease;
    }

    input:focus {
      border-color: var(--blue-focus);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.14);
    }

    input.valid {
      border-color: #26a65b;
      box-shadow: 0 0 0 4px rgba(38,166,91,0.12);
    }

    input.invalid {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(255,59,48,0.12);
    }

    .error {
      display: none;
      color: #ff7f78;
      font-size: 14px;
      margin-top: 8px;
      line-height: 1.45;
      font-weight: 700;
    }

    .error.show { display: block; }

    .email-suggestions {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .email-suggestions.hidden { display: none; }

    .email-suggestion-item {
      width: 100%;
      border: 1px solid #d8d8d8;
      border-radius: 14px;
      background: #f8f8f8;
      color: #111111;
      padding: 14px 16px;
      font-size: 17px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
    }

    .email-suggestion-item:hover {
      transform: translateY(-1px);
      border-color: #bdbdbd;
      box-shadow: 0 10px 24px rgba(0,0,0,0.14);
    }

    .email-suggestion-item strong { font-weight: 900; }

    .consent-box {
      margin-top: 10px;
      padding: 13px 13px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.055);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .consent-box.ready {
      border-color: rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.026);
    }

    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .consent-check {
      position: relative;
      flex: 0 0 24px;
      width: 24px;
      height: 24px;
      margin-top: 2px;
    }

    .consent-check input {
      position: absolute;
      inset: 0;
      margin: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
    }

    .consent-check-ui {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease, transform 0.14s ease;
      box-shadow: 0 0 0 0 rgba(246,211,0,0);
    }

    .consent-box.ready .consent-check-ui {
      border-color: rgba(246,211,0,0.80);
      box-shadow: 0 0 0 3px rgba(246,211,0,0.08), 0 0 16px rgba(246,211,0,0.10);
      animation: consentCheckPulse 1.7s ease-in-out infinite;
    }

    .consent-check input:hover + .consent-check-ui,
    .consent-check input:focus + .consent-check-ui {
      border-color: rgba(246,211,0,0.85);
      box-shadow: 0 0 0 4px rgba(246,211,0,0.10), 0 0 18px rgba(246,211,0,0.10);
      outline: none;
    }

    .consent-check input:checked + .consent-check-ui {
      border-color: var(--yellow);
      background: rgba(246,211,0,0.12);
      box-shadow: 0 0 0 4px rgba(246,211,0,0.10), 0 0 18px rgba(246,211,0,0.14);
      animation: none;
    }

    .consent-check input:checked + .consent-check-ui::after {
      content: "";
      width: 6px;
      height: 11px;
      border-right: 3px solid var(--yellow);
      border-bottom: 3px solid var(--yellow);
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .consent-copy { flex: 1; min-width: 0; }

    .consent-title {
      color: #ededed;
      font-size: 12.9px;
      line-height: 1.48;
      font-weight: 650;
      margin: 0;
      letter-spacing: 0.01em;
    }

    .consent-note {
      margin-top: 7px;
      color: #cfcfcf;
      font-size: 13px;
      line-height: 1.55;
    }

    .consent-note a,
    .privacy-link-btn {
      color: #fff2a6;
      font-weight: 800;
      text-decoration: underline;
      text-underline-offset: 2px;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      font: inherit;
      cursor: pointer;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 16px;
      font-weight: 900;
      font-size: 19px;
      padding: 18px 16px;
      cursor: pointer;
      margin-top: 12px;
      transition: transform 0.14s ease, opacity 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .button:hover { filter: brightness(1.03); transform: translateY(-1px); }
    .button:active { transform: scale(0.985); }
    .button:disabled { cursor: not-allowed; transform: none; filter: none; }

    .button-outline {
      background: transparent;
      border: 2px solid #404040;
      color: #cfcfcf;
      box-shadow: none;
    }

    .button-outline:hover {
      border-color: #6a6a6a;
      color: #ffffff;
      background: rgba(255,255,255,0.02);
      filter: none;
    }

    .button-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
      flex: 0 0 24px;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 6px;
    }

    .button-lead-disabled {
      background: #161616;
      color: rgba(255,255,255,0.58);
      border: 1px solid #2f2f2f;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .button-lead-waiting {
      background: #1a1a1a;
      color: #f1f1f1;
      border: 1px solid rgba(246,211,0,0.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 1px rgba(246,211,0,0.05);
      pointer-events: none;
    }

    .button-lead-active {
      background: var(--yellow);
      color: #0b0b0b;
      border: 1px solid rgba(246,211,0,0.55);
      box-shadow: 0 10px 28px rgba(246, 211, 0, 0.16);
      animation: invitePulse 1.5s ease-in-out infinite;
      pointer-events: auto;
    }

    .button-progress-track {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: inherit;
      pointer-events: none;
    }

    .button-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 84%;
      background: linear-gradient(90deg, rgba(246,211,0,0.10), rgba(246,211,0,0.22), rgba(246,211,0,0.10));
      box-shadow: inset -1px 0 0 rgba(246,211,0,0.20);
      animation: buttonNeedConsentGlow 1.6s ease-in-out infinite;
    }

    .button-content {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .question-title {
      font-size: 29px;
      line-height: 1.18;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid var(--border);
      background: linear-gradient(180deg, #0d0d0d 0%, #111111 100%);
      color: #ffffff;
      border-radius: 18px;
      padding: 18px 16px;
      font-size: 18px;
      text-align: left;
      cursor: pointer;
      line-height: 1.45;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, transform 0.16s ease;
      animation: neutralBreathLoop 2.2s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .answer-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(246,211,0,0) 0%, rgba(246,211,0,0.07) 50%, rgba(246,211,0,0) 100%);
      transform: translateX(-115%);
      pointer-events: none;
    }

    .answer-btn:hover,
    .answer-btn:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.04);
      outline: none;
      transform: translateY(-1px);
    }

    .answer-btn:active { transform: scale(0.992); }

    .answer-radio {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      flex: 0 0 22px;
      position: relative;
      transition: border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      background: transparent;
    }

    .answer-btn.selected {
      border-color: var(--yellow);
      background: var(--yellow-soft-2);
      box-shadow: 0 0 0 4px var(--yellow-soft), 0 0 22px rgba(246, 211, 0, 0.14);
      animation: selectedGlow 0.9s ease-in-out 1;
    }

    .answer-btn.selected::after { animation: shineAcross 0.7s ease 1; }

    .answer-btn.selected .answer-radio {
      border-color: var(--yellow);
      background: var(--yellow);
      box-shadow: 0 0 0 5px rgba(246,211,0,0.16);
    }

    .answer-btn.selected .answer-radio::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #111111;
    }

    .answer-btn.confirming { animation: confirmPulse 0.55s ease 2; }
    .answer-text { flex: 1; }

    .result-box,
    .info-box {
      background: linear-gradient(180deg, #0f0f0f 0%, #131313 100%);
      border: 1px solid #2d2d2d;
      border-radius: 18px;
      padding: 18px;
      margin-top: 12px;
    }

    .small-note {
      color: #d2d2d2;
      font-size: 15px;
      line-height: 1.6;
    }

    .warning-highlight {
      margin-top: 16px;
      border: 1px solid rgba(246, 211, 0, 0.35);
      background: rgba(246, 211, 0, 0.08);
      border-radius: 16px;
      padding: 14px 14px 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      box-shadow: 0 0 0 1px rgba(246, 211, 0, 0.08);
      animation: attentionPulse 1.8s ease-in-out infinite;
    }

    .warning-icon {
      font-size: 20px;
      line-height: 1;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .warning-text {
      color: #fff4a8;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .positive-box {
      margin-top: 16px;
      border: 1px solid rgba(44,186,93,0.45);
      background: rgba(44,186,93,0.15);
      border-radius: 16px;
      padding: 16px;
      color: #d9ffe8;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 700;
      box-shadow: 0 0 0 2px rgba(44,186,93,0.10);
    }

    .highlight-list {
      display: grid;
      gap: 10px;
      margin: 18px 0 6px;
    }

    .highlight-item {
      background: rgba(246,211,0,0.07);
      border: 1px solid rgba(246,211,0,0.18);
      color: #fff8bf;
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    .choice-inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .toggle-btn {
      width: 100%;
      border: 1.8px solid rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%), #101010;
      color: #ffffff;
      border-radius: 16px;
      padding: 16px 12px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, transform 0.14s ease;
      min-height: 58px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 18px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
    }

    .toggle-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(246,211,0,0) 0%, rgba(246,211,0,0.09) 50%, rgba(246,211,0,0) 100%);
      transform: translateX(-120%);
      transition: transform 0.55s ease;
      pointer-events: none;
    }

    .toggle-btn:hover {
      border-color: rgba(246,211,0,0.42);
      transform: translateY(-1px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 3px rgba(246,211,0,0.07), 0 12px 22px rgba(0,0,0,0.20);
    }

    .toggle-btn:hover::before { transform: translateX(120%); }

    .toggle-btn.active {
      border-color: var(--yellow);
      background: linear-gradient(180deg, rgba(246,211,0,0.15) 0%, rgba(246,211,0,0.07) 100%), #101010;
      color: #ffffff;
      box-shadow: 0 0 0 4px rgba(246,211,0,0.12), 0 0 22px rgba(246,211,0,0.10), 0 10px 22px rgba(0,0,0,0.18);
      animation: selectedGlow 0.7s ease 1;
    }

    .toggle-btn.active::before { transform: translateX(120%); }

    .section-intro-note {
      margin-top: 12px;
      color: #e4e4e4;
      font-size: 13px;
      line-height: 1.55;
    }

    .trust-box {
      margin-top: 12px;
      padding: 14px 14px 14px 15px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(44,186,93,0.10) 0%, rgba(44,186,93,0.05) 100%);
      border: 1px solid rgba(44,186,93,0.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 0 0 1px rgba(44,186,93,0.05);
      display: flex;
      gap: 11px;
      align-items: flex-start;
    }

    .trust-icon {
      font-size: 19px;
      line-height: 1;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .trust-content { flex: 1; min-width: 0; }

    .trust-title {
      color: #dbffe8;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.4;
      margin: 0 0 4px;
    }

    .trust-text {
      color: #d7f6e2;
      font-size: 13px;
      line-height: 1.55;
      margin: 0;
      font-weight: 700;
    }

    .hidden { display: none !important; }
    .fade-in { animation: fadeSlideUp 0.35s ease both; }

    .modal-overlay,
    .privacy-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .modal-box {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(180deg, #111111 0%, #0a0a0a 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px 18px 18px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.5);
      animation: modalPop 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .modal-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .modal-text {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .modal-text strong { color: #fff4a8; font-weight: 900; }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .final-cta-box {
      margin-top: 14px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .inline-success {
      margin-top: 12px;
      color: #b8ffd1;
      background: var(--green-soft);
      border: 1px solid rgba(44,186,93,0.26);
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
    }

    .privacy-panel {
      width: 100%;
      max-width: 760px;
      height: min(92vh, 900px);
      background: linear-gradient(180deg, #111111 0%, #0a0a0a 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: modalPop 0.18s ease;
    }

    .privacy-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      flex: 0 0 auto;
    }

    .privacy-back-btn {
      border: 1px solid rgba(246,211,0,0.34);
      background: linear-gradient(180deg, rgba(246,211,0,0.18) 0%, rgba(246,211,0,0.08) 100%);
      color: #fff6bf;
      border-radius: 14px;
      min-height: 48px;
      min-width: 126px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 900;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 0 0 2px rgba(246,211,0,0.08), 0 0 18px rgba(246,211,0,0.10);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.14s ease, box-shadow 0.2s ease;
      animation: privacyBackPulse 1.55s ease-in-out infinite;
      flex: 0 0 auto;
    }

    .privacy-back-btn:hover {

      .fade-in { animation: none; }

      .privacy-overlay {
        padding: 0;
        align-items: stretch;
        justify-content: stretch;

      .privacy-panel {
        max-width: none;
        width: 100%;
        height: 100vh;
        border-radius: 0;

        min-height: 46px;

      }

        font-size: 18px;
        line-height: 1.18;
        text-align: left;
        padding-right: 0;
      }

      }

</head>

    const QUIZ = {

        ]
      },
      p6: {

        options: [
          { label: "🚀 Preciso para esta semana.", short: "Esta semana", whatsappLabel: "Esta semana", next: "p7" },
          { label: "📅 Preciso para este mês.", short: "Este mês", whatsappLabel: "Este mês", next: "p7" },
          { label: "🔎 Estou pesquisando preços e taxas.", short: "Pesquisando", whatsappLabel: "Pesquisando", next: "p7" }

    const app = document.getElementById("app");
    const modalRoot = document.getElementById("modalRoot");
    const privacyRoot = document.getElementById("privacyRoot");

    function render() {
      closeModal(false);
      window.scrollTo(0, 0);
      app.innerHTML = `${buildProgressBar()}<div class="fade-in">${renderStepContent()}</div>`;
      attachCurrentStepEvents();
    }

    function renderStepContent() {
      if (state.currentStep === "lead") return renderLeadFormMarkup();
      if (QUIZ[state.currentStep]) return renderQuestionMarkup(state.currentStep);
      if (state.currentStep === "p4b") return renderNewHolderValidationMarkup();
      if (state.currentStep === "e1") return renderQualifiedMarkup();
      if (state.currentStep === "d1") return renderDisqualifiedMarkup();
      if (state.currentStep === "d2") return renderAlternativeProposalMarkup();
      if (state.currentStep === "e3") return renderClosedFlowMarkup();
      return `<div><h2>Algo saiu do fluxo.</h2></div>`;
    }

    function attachCurrentStepEvents() {
      if (state.currentStep === "lead") return attachLeadFormEvents();
      if (QUIZ[state.currentStep]) return attachQuestionEvents();
      if (state.currentStep === "p4b") return attachNewHolderValidationEvents();
      if (state.currentStep === "e1") return attachQualifiedEvents();
      if (state.currentStep === "d1") return attachDisqualifiedEvents();
      if (state.currentStep === "d2") return attachAlternativeProposalEvents();
      if (state.currentStep === "e3") return attachClosedFlowEvents();
    }

    function buildProgressBar() {
      const progressMap = { lead: 12, p1: 45, p2: 58, p3: 58, p4: 68, p4b: 74, p5: 82, p6: 90, p7: 96, e1: 100, d1: 100, d2: 100, e3: 100 };
      const percent = progressMap[state.currentStep] || 12;
      return `<div class="progress-wrap"><div class="progress-track" aria-hidden="true"><div class="progress-fill" style="width:${percent}%"></div></div></div>`;
    }

    function renderLeadFormMarkup() {
      const leadStatus = getLeadAdvanceStatus();
      return `
        <div>
          <h1>${escapeHtml(CONFIG.titleLeadForm)}</h1>
          <div class="subtitle">${escapeHtml(CONFIG.subtitleLeadForm)}</div>
          <form id="formQuizDenver" novalidate>
            <div class="field">
              <label for="nome">Primeiro nome <span class="required">*</span></label>
              <input type="text" id="nome" name="nome" placeholder="Digite apenas o seu primeiro nome" autocomplete="given-name" value="${escapeHtml(state.lead.nome)}" />
              <div class="error" id="error-nome"></div>
            </div>
            <div class="field">
              <label for="whatsapp">WhatsApp <span class="required">*</span></label>
              <input type="tel" id="whatsapp" name="whatsapp" placeholder="(DDD) 9 0000-0000" inputmode="numeric" autocomplete="tel" value="${escapeHtml(formatPhone(state.lead.whatsapp))}" />

            </div>

              <div class="error" id="error-email"></div>
            </div>

                <label class="consent-check" for="consent">

    function renderQuestionMarkup(stepKey) {
      const question = QUIZ[stepKey];

          </div>
        </div>
      `;
    }

    function renderNewHolderValidationMarkup() {
      const firstName = getFirstName(state.lead.nome);
      const cpfDigits = state.newHolder.cpf || "";
      const cpfValid = cpfDigits.length === 11 && isAcceptableCPF(cpfDigits);
      const hasCnpj = state.newHolder.hasCnpj;
      const cnpjVisible = cpfValid && hasCnpj === "Sim";
      const cnpjValue = state.newHolder.cnpj || "";
      const cnpjValid = cnpjValue.length === 14 && isAcceptableCNPJGeneral(cnpjValue);
      const canContinue = cpfValid && (hasCnpj === "Não" || (hasCnpj === "Sim" && cnpjValid));

      return `

                <div class="section-intro-note">Isso ajuda a verificar opções compatíveis com o perfil do novo titular, sem mudar a análise principal.</div>

                <button type="submit" class="button button-lead-active" id="btnContinueNewHolder"><span>CONTINUAR ANÁLISE →</span></button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    function renderQualifiedMarkup() {
      const firstName = getFirstName(state.lead.nome);
      return `
        <div>
          <h2>${escapeHtml(firstName)}, tudo certo por aqui!</h2>

    function attachLeadFormEvents() {
      const form = document.getElementById("formQuizDenver");
      const nomeInput = document.getElementById("nome");
      const whatsappInput = document.getElementById("whatsapp");
      const emailInput = document.getElementById("email");
      const consentInput = document.getElementById("consent");
      const btnNextLead = document.getElementById("btnNextLead");
      const btnPrivacyOpen = document.getElementById("btnPrivacyOpen");

      if (btnPrivacyOpen) btnPrivacyOpen.addEventListener("click", openPrivacyPanel);

      nomeInput.addEventListener("input", (e) => { handleNameInputFormat(e); state.lead.nome = normalizeName(e.target.value); validateNome(false); updateLeadButtonState(); });
      whatsappInput.addEventListener("keydown", handleWhatsAppKeydown);
      whatsappInput.addEventListener("input", (e) => { handleWhatsAppInput(e); validateWhatsapp(false); maybeAdvanceFromWhatsappToEmail(); updateLeadButtonState(); });
      emailInput.addEventListener("keydown", (e) => { if (e.key === " ") e.preventDefault(); });
      emailInput.addEventListener("input", (e) => { const normalizedEmail = normalizeEmail(e.target.value); e.target.value = normalizedEmail; state.lead.email = normalizedEmail; validateEmail(false); renderEmailSuggestions(); updateLeadButtonState(); });
      emailInput.addEventListener("focus", renderEmailSuggestions);
      emailInput.addEventListener("blur", () => { const normalizedEmail = normalizeEmail(emailInput.value); emailInput.value = normalizedEmail; state.lead.email = normalizedEmail; validateEmail(true); updateLeadButtonState(); setTimeout(hideEmailSuggestions, 120); });
      nomeInput.addEventListener("blur", () => { validateNome(true); updateLeadButtonState(); });
      whatsappInput.addEventListener("blur", () => { const digits = normalizeBrazilPhoneInput(whatsappInput.value); state.lead.whatsapp = digits; whatsappInput.value = formatPhone(digits); validateWhatsapp(true); updateLeadButtonState(); });

      if (consentInput) consentInput.addEventListener("change", () => { state.lead.consent = !!consentInput.checked; validateConsent(false); updateLeadButtonState(); });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        state.lead.nome = normalizeName(nomeInput.value.trim());
        state.lead.whatsapp = normalizeBrazilPhoneInput(whatsappInput.value);
        state.lead.email = normalizeEmail(emailInput.value);
        state.lead.consent = !!(consentInput && consentInput.checked);
        nomeInput.value = state.lead.nome;
        whatsappInput.value = formatPhone(state.lead.whatsapp);
        emailInput.value = state.lead.email;
        const nomeOk = validateNome(true);
        const whatsappOk = validateWhatsapp(true);
        const emailOk = validateEmail(true);
        const consentOk = validateConsent(true);
        updateLeadButtonState();
        if (!nomeOk || !whatsappOk || !emailOk || !consentOk) return;
        btnNextLead.disabled = true;
        btnNextLead.className = "button button-lead-disabled";
        btnNextLead.innerHTML = `<span class="button-content">CARREGANDO...</span>`;
        pushDataLayerEvent("quiz_contact_step_completed", { nome: state.lead.nome, whatsapp: state.lead.whatsapp, email: state.lead.email, consent: state.lead.consent ? "sim" : "nao" });
        await sendToAppsScript("lead_form_completed", { consent: state.lead.consent ? "sim" : "nao" });
        state.currentStep = "p1";
        render();
      });

      renderEmailSuggestions();
      updateLeadButtonState();
    }

    function attachQuestionEvents() {
      document.querySelectorAll(".answer-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (btn.dataset.locked === "1") return;
          btn.dataset.locked = "1";
          const step = btn.getAttribute("data-step");
          const index = Number(btn.getAttribute("data-index"));
          const selected = QUIZ[step].options[index];
          document.querySelectorAll(".answer-btn").forEach((item) => { item.style.pointerEvents = "none"; });
          btn.classList.add("selected", "confirming");
          state.answers[step] = selected.whatsappLabel;
          pushDataLayerEvent("quiz_answer", { step, answer: selected.short, next_step: selected.next });
          await sendToAppsScript("quiz_answer", { answered_step: step, answered_value: selected.short, next_step: selected.next });
          setTimeout(() => {
            state.currentStep = selected.next;
            if (selected.next === "e1") state.finalType = "qualified";
            if (selected.next === "d1") state.finalType = "disqualified";
            if (selected.next === "e3") state.finalType = "closed";
            render();
          }, 700);
        });
      });
    }

    function looksRandomToken(token) { const clean = String(token || "").toLowerCase().replace(/[^a-z0-9]/g, ""); if (!clean || clean.length < 3 || /^\d+$/.test(clean) || /^(.)\1+$/.test(clean)) return true; const vowels = (clean.match(/[aeiou]/g) || []).length; const uniqueChars = new Set(clean.split("")).size; if (clean.length <= 6 && vowels <= 1 && uniqueChars >= 3) return true; if (/^[bcdfghjklmnpqrstvwxyz]{5,}$/i.test(clean)) return true; return false; }
    function captureUTMs() { const params = new URLSearchParams(window.location.search); state.utms = { utm_source: params.get("utm_source") || "", utm_medium: params.get("utm_medium") || "", utm_campaign: params.get("utm_campaign") || "", utm_content: params.get("utm_content") || "", utm_term: params.get("utm_term") || "", fbclid: params.get("fbclid") || "", gclid: params.get("gclid") || "", ttclid: params.get("ttclid") || "" }; }
    function detectOrigin() { const ref = (document.referrer || "").toLowerCase(); state.origin = ref; sessionStorage.setItem("quiz_referrer", ref); }
    function exitSiteByOrigin() { const ref = sessionStorage.getItem("quiz_referrer") || state.origin || ""; if (window.history.length > 1) { history.back(); setTimeout(() => fallbackExit(ref), 900); return; } fallbackExit(ref); }
    function fallbackExit(ref) { const origin = String(ref || "").toLowerCase(), utmSource = String(state.utms.utm_source || "").toLowerCase(); if (origin.includes("instagram") || utmSource.includes("instagram")) return window.location.href = "https://www.instagram.com/"; if (origin.includes("facebook") || origin.includes("fb") || utmSource.includes("facebook")) return window.location.href = "https://www.facebook.com/"; if (origin.includes("tiktok") || utmSource.includes("tiktok")) return window.location.href = "https://www.tiktok.com/"; if (origin.includes("google") || utmSource.includes("google")) return window.location.href = "https://www.google.com/"; window.location.href = "about:blank"; }
    function pushDataLayerEvent(eventName, extra = {}) {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event: eventName, nome: state.lead.nome || "", whatsapp: state.lead.whatsapp || "", email: state.lead.email || "", consent: state.lead.consent ? "sim" : "nao", p1: state.answers.p1 || "", p2: state.answers.p2 || "", p3: state.answers.p3 || "", p4: state.answers.p4 || "", p5: state.answers.p5 || "", p6: state.answers.p6 || "", p7: state.answers.p7 || "", new_holder_cpf: state.newHolder.cpf || "", new_holder_has_cnpj: state.newHolder.hasCnpj || "", new_holder_cnpj: state.newHolder.cnpj || "", cpf: state.alternate.cpf || "", has_cnpj: state.alternate.hasCnpj || "", cnpj: state.alternate.cnpj || "", ...state.utms, ...extra });
    }
    async function sendToAppsScript(eventType, extra = {}) {
      if (!CONFIG.appsScriptUrl) return;
      const payload = { event_type: eventType, timestamp: new Date().toISOString(), nome: state.lead.nome || "", whatsapp: state.lead.whatsapp || "", email: state.lead.email || "", consent: state.lead.consent ? "sim" : "nao", p1: state.answers.p1 || "", p2: state.answers.p2 || "", p3: state.answers.p3 || "", p4: state.answers.p4 || "", p5: state.answers.p5 || "", p6: state.answers.p6 || "", p7: state.answers.p7 || "", new_holder_cpf: state.newHolder.cpf || "", new_holder_has_cnpj: state.newHolder.hasCnpj || "", new_holder_cnpj: state.newHolder.cnpj || "", cpf: state.alternate.cpf || "", has_cnpj: state.alternate.hasCnpj || "", cnpj: state.alternate.cnpj || "", final_type: state.finalType || "", origin: state.origin || "", ...state.utms, ...extra };
      try {
        await fetch(CONFIG.appsScriptUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      } catch (error) {
        console.error("Erro ao enviar Apps Script:", error);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    captureUTMs();
    detectOrigin();
    render();
  </script>
