<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário Denver Maquininhas</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}

button{
  background:#FFD400;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Antes de continuar, me diga como posso falar com você 👇</h2>

<label>Nome</label>
<input type="text" id="nome" placeholder="Digite seu nome">

<label>WhatsApp</label>
<input type="tel" id="telefone" placeholder="(DDD) 9 0000-0000">

<label>E-mail</label>
<input type="email" id="email" placeholder="seuemail@gmail.com">

<button onclick="proximo()">PRÓXIMO</button>

</div>

<script>
function proximo(){
  alert("Formulário capturado! Próxima etapa será o quiz.");
}
</script>

</body>
</html>
